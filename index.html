<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima para Dummies</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --surface2: #1e2631;
    --border: #30363d;
    --accent: #58a6ff;
    --accent2: #3fb950;
    --text: #e6edf3;
    --muted: #8b949e;
    --user-bubble: #1f3a5f;
    --ai-bubble: #1e2631;
    --danger: #f85149;
    --warm: #f0883e;
  }

  body {
    font-family: 'Outfit', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── HEADER ── */
  .app-header {
    width: 100%;
    max-width: 680px;
    padding: 28px 20px 0;
    text-align: center;
  }

  .logo {
    font-size: 1.05rem;
    font-weight: 700;
    letter-spacing: .08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  .tagline {
    color: var(--muted);
    font-size: 0.82rem;
  }

  /* ── SEARCH BAR ── */
  .search-wrap {
    width: 100%;
    max-width: 680px;
    padding: 20px 20px 0;
  }

  .search-row {
    display: flex;
    gap: 8px;
  }

  .search-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 1rem;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
  }

  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--accent); }

  .search-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 0 20px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: opacity .2s, transform .1s;
    white-space: nowrap;
  }
  .search-btn:hover { opacity: .85; }
  .search-btn:active { transform: scale(.97); }
  .search-btn:disabled { opacity: .4; cursor: default; }

  /* ── LOCATION BADGE ── */
  .location-badge {
    display: none;
    align-items: center;
    gap: 6px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 7px 14px;
    font-size: 0.82rem;
    color: var(--muted);
    margin-top: 10px;
    width: fit-content;
  }
  .location-badge.visible { display: flex; }
  .location-badge span { color: var(--text); font-weight: 600; }

  /* ── WEATHER CARD ── */
  .weather-card {
    display: none;
    width: 100%;
    max-width: 680px;
    padding: 16px 20px 0;
  }
  .weather-card.visible { display: block; }

  .card-inner {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .card-inner::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }

  .weather-phrase {
    font-size: 1.15rem;
    font-weight: 700;
    line-height: 1.45;
    margin-bottom: 16px;
  }

  .pills {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .pill {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-size: 0.8rem;
    color: var(--muted);
  }
  .pill b { color: var(--text); }

  /* ── CHAT ── */
  .chat-section {
    display: none;
    width: 100%;
    max-width: 680px;
    padding: 16px 20px 0;
    flex-direction: column;
    flex: 1;
  }
  .chat-section.visible { display: flex; }

  .chat-label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .chat-messages {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 12px;
    max-height: 340px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .chat-messages::-webkit-scrollbar { width: 4px; }
  .chat-messages::-webkit-scrollbar-track { background: transparent; }
  .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  .bubble {
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 0.93rem;
    line-height: 1.5;
    max-width: 90%;
  }

  .bubble.user {
    background: var(--user-bubble);
    color: var(--text);
    align-self: flex-end;
    border-bottom-right-radius: 4px;
  }

  .bubble.ai {
    background: var(--ai-bubble);
    border: 1px solid var(--border);
    color: var(--text);
    align-self: flex-start;
    border-bottom-left-radius: 4px;
  }

  .bubble.ai.loading {
    color: var(--muted);
    font-style: italic;
  }

  /* Suggestions */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 10px;
  }

  .suggestion-chip {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 13px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.78rem;
    color: var(--muted);
    cursor: pointer;
    transition: border-color .2s, color .2s;
  }
  .suggestion-chip:hover { border-color: var(--accent); color: var(--accent); }

  /* Chat input */
  .chat-input-row {
    display: flex;
    gap: 8px;
  }

  .chat-input {
    flex: 1;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 13px 16px;
    font-family: 'Outfit', sans-serif;
    font-size: 0.93rem;
    color: var(--text);
    outline: none;
    transition: border-color .2s;
    resize: none;
  }
  .chat-input::placeholder { color: var(--muted); }
  .chat-input:focus { border-color: var(--accent); }

  .send-btn {
    background: var(--accent2);
    color: #000;
    border: none;
    border-radius: 12px;
    padding: 0 18px;
    font-family: 'Outfit', sans-serif;
    font-weight: 700;
    font-size: 1.1rem;
    cursor: pointer;
    transition: opacity .2s;
  }
  .send-btn:hover { opacity: .85; }
  .send-btn:disabled { opacity: .35; cursor: default; }

  /* Error */
  .error-toast {
    display: none;
    background: #2d1117;
    border: 1px solid var(--danger);
    color: var(--danger);
    border-radius: 10px;
    padding: 10px 16px;
    font-size: 0.85rem;
    margin-top: 10px;
    max-width: 680px;
    width: calc(100% - 40px);
  }
  .error-toast.visible { display: block; }

  /* Loader dots */
  .dots::after {
    content: '';
    animation: dots 1.2s steps(3, end) infinite;
  }
  @keyframes dots {
    0%   { content: '.'; }
    33%  { content: '..'; }
    66%  { content: '...'; }
  }

  .bottom-pad { height: 32px; }
</style>
</head>
<body>

<div class="app-header">
  <div class="logo">☁️ Clima para Dummies</div>
  <div class="tagline">El pronóstico, pero en cristiano.</div>
</div>

<div class="search-wrap">
  <div class="search-row">
    <input class="search-input" id="lugar-input" type="text"
      placeholder="Escribí un lugar… Palermo, Rosario, Miami…"
      onkeydown="if(event.key==='Enter') buscarLugar()">
    <button class="search-btn" id="search-btn" onclick="buscarLugar()">Buscar</button>
  </div>
  <div class="location-badge" id="location-badge">
    📍 Clima para: <span id="location-name"></span>
  </div>
</div>

<div class="error-toast" id="error-toast"></div>

<div class="weather-card" id="weather-card">
  <div class="card-inner">
    <div class="weather-phrase" id="weather-phrase"></div>
    <div class="pills" id="weather-pills"></div>
  </div>
</div>

<div class="chat-section" id="chat-section">
  <div class="chat-label">Preguntale lo que quieras ↓</div>
  <div class="chat-messages" id="chat-messages"></div>
  <div class="suggestions" id="suggestions"></div>
  <div class="chat-input-row">
    <input class="chat-input" id="chat-input" type="text"
      placeholder="¿Cómo estará el finde? ¿Llevo paraguas el martes?…"
      onkeydown="if(event.key==='Enter') enviarPregunta()">
    <button class="send-btn" id="send-btn" onclick="enviarPregunta()">↑</button>
  </div>
</div>

<div class="bottom-pad"></div>

<script>
// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let climaData = null;
let lugarNombre = '';
let chatHistory = [];

const SUGERENCIAS = [
  "¿Cómo estará el finde?",
  "¿Llevo paraguas mañana?",
  "¿Va a llover esta semana?",
  "¿Qué día va a hacer más calor?",
  "¿Es buen clima para salir hoy?",
];

// ─────────────────────────────────────────────
// SEARCH
// ─────────────────────────────────────────────
async function buscarLugar() {
  const input = document.getElementById('lugar-input');
  const lugar = input.value.trim();
  if (!lugar) return;

  setSearchLoading(true);
  ocultarError();

  try {
    // 1. Geocoding
    const geoRes = await fetch(
      `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(lugar)}&format=json&limit=1`,
      { headers: { 'Accept-Language': 'es' } }
    );
    const geoData = await geoRes.json();

    if (!geoData.length) {
      mostrarError(`No encontré "${lugar}". Probá con otro nombre.`);
      setSearchLoading(false);
      return;
    }

    const { lat, lon, display_name } = geoData[0];
    lugarNombre = display_name.split(',')[0];
    document.getElementById('location-name').textContent = lugarNombre;
    document.getElementById('location-badge').classList.add('visible');

    // 2. Clima: actual + 7 días de pronóstico
    const climaRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}` +
      `&current=temperature_2m,rain,wind_speed_10m,weather_code` +
      `&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,wind_speed_10m_max,weather_code` +
      `&timezone=auto&forecast_days=7`
    );
    const raw = await climaRes.json();

    climaData = {
      ahora: {
        temp: Math.round(raw.current.temperature_2m),
        lluvia: raw.current.rain,
        viento: Math.round(raw.current.wind_speed_10m),
        codigo: raw.current.weather_code,
      },
      semana: raw.daily.time.map((dia, i) => ({
        fecha: dia,
        maxTemp: Math.round(raw.daily.temperature_2m_max[i]),
        minTemp: Math.round(raw.daily.temperature_2m_min[i]),
        lluvia: raw.daily.precipitation_sum[i],
        viento: Math.round(raw.daily.wind_speed_10m_max[i]),
        codigo: raw.daily.weather_code[i],
      }))
    };

    mostrarResumenInicial();
    mostrarChatSection();
    chatHistory = [];
    document.getElementById('chat-messages').innerHTML = '';
    mostrarSugerencias();

  } catch (e) {
    mostrarError('Algo salió mal. Revisá tu conexión e intentá de nuevo.');
  }

  setSearchLoading(false);
}

// ─────────────────────────────────────────────
// WEATHER SUMMARY
// ─────────────────────────────────────────────
function mostrarResumenInicial() {
  const c = climaData.ahora;
  let frase = '';

  if (c.lluvia > 2) {
    frase = `🌧️ Está lloviendo en serio. Si salís, llevate paraguas o piloto, sin excusas.`;
  } else if (c.lluvia > 0) {
    frase = `🌦️ Hay una llovizna molesta. No te empapás, pero algo te cae igual.`;
  } else if (c.temp > 32) {
    frase = `🥵 Calor de locos. Hidratate, buscá la sombra y no te mandes a hacer ejercicio afuera.`;
  } else if (c.viento > 25) {
    frase = `💨 Está muy ventoso. Rico para la cara, pero ojo con las cosas que vuelan.`;
  } else if (c.temp < 8) {
    frase = `🥶 Frío en serio. Abrigate bien, en serio, no seas héroe.`;
  } else if (c.temp < 17) {
    frase = `🧥 Fresco. Ponete un buzo o campera antes de salir, te lo agradecés.`;
  } else {
    frase = `😎 Día impecable. Ni frío, ni calor, sin agua. Perfecta para salir.`;
  }

  document.getElementById('weather-phrase').textContent = frase;
  document.getElementById('weather-pills').innerHTML = `
    <div class="pill">🌡️ <b>${c.temp}°C</b> ahora</div>
    <div class="pill">🌧️ Lluvia: <b>${c.lluvia} mm</b></div>
    <div class="pill">💨 Viento: <b>${c.viento} km/h</b></div>
  `;
  document.getElementById('weather-card').classList.add('visible');
}

// ─────────────────────────────────────────────
// CHAT
// ─────────────────────────────────────────────
function mostrarChatSection() {
  document.getElementById('chat-section').classList.add('visible');
}

function mostrarSugerencias() {
  const wrap = document.getElementById('suggestions');
  wrap.innerHTML = SUGERENCIAS.map(s =>
    `<button class="suggestion-chip" onclick="usarSugerencia('${s}')">${s}</button>`
  ).join('');
}

function usarSugerencia(texto) {
  document.getElementById('chat-input').value = texto;
  enviarPregunta();
}

async function enviarPregunta() {
  const input = document.getElementById('chat-input');
  const pregunta = input.value.trim();
  if (!pregunta || !climaData) return;

  input.value = '';
  document.getElementById('suggestions').innerHTML = '';
  document.getElementById('send-btn').disabled = true;

  agregarBurbuja('user', pregunta);
  const loadingEl = agregarBurbuja('ai', 'Pensando', true);

  chatHistory.push({ role: 'user', content: pregunta });

  // Construir contexto de clima para la IA
  const hoy = climaData.semana[0];
  const semanaTexto = climaData.semana.map((d, i) => {
    const labels = ['Hoy', 'Mañana', 'Pasado mañana', 'En 3 días', 'En 4 días', 'En 5 días', 'En 6 días'];
    return `${labels[i] || d.fecha}: máx ${d.maxTemp}°C, mín ${d.minTemp}°C, lluvia ${d.lluvia}mm, viento ${d.viento}km/h`;
  }).join('\n');

  const systemPrompt = `Sos un amigo que sabe mucho de meteorología pero habla en lenguaje súper simple, argentino/latino, sin tecnicismos. 
El usuario ya sabe el clima básico de hoy. Responde sus preguntas sobre el clima de "${lugarNombre}" de forma directa, concisa y con humor liviano cuando corresponda.
Nunca hagas listas largas ni párrafos enormes. Máximo 3-4 oraciones. Usá emojis con moderación.
Si preguntan algo que no está en los datos (como "por qué llovió la semana pasada"), explicalo de forma simple y educativa, mencionando que no tenés datos históricos exactos pero podés explicar el fenómeno.

DATOS ACTUALES en ${lugarNombre}:
- Ahora mismo: ${climaData.ahora.temp}°C, lluvia ${climaData.ahora.lluvia}mm, viento ${climaData.ahora.viento}km/h
- Pronóstico de la semana:
${semanaTexto}

La fecha de hoy es: ${new Date().toLocaleDateString('es-AR', { weekday: 'long', day: 'numeric', month: 'long' })}.`;

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: chatHistory,
      })
    });

    const data = await response.json();
    const respuesta = data.content?.[0]?.text || 'No pude procesar eso, probá de nuevo.';

    loadingEl.classList.remove('loading');
    loadingEl.textContent = respuesta;

    chatHistory.push({ role: 'assistant', content: respuesta });

  } catch (e) {
    loadingEl.classList.remove('loading');
    loadingEl.textContent = 'Se cortó la conexión. Intentá de nuevo.';
    loadingEl.style.color = 'var(--danger)';
    chatHistory.pop();
  }

  document.getElementById('send-btn').disabled = false;
  scrollChat();
}

// ─────────────────────────────────────────────
// UI HELPERS
// ─────────────────────────────────────────────
function agregarBurbuja(rol, texto, loading = false) {
  const wrap = document.getElementById('chat-messages');
  const el = document.createElement('div');
  el.className = `bubble ${rol}${loading ? ' loading' : ''}`;
  el.innerHTML = loading ? `<span class="dots">${texto}</span>` : texto;
  wrap.appendChild(el);
  scrollChat();
  return el;
}

function scrollChat() {
  const wrap = document.getElementById('chat-messages');
  wrap.scrollTop = wrap.scrollHeight;
}

function setSearchLoading(v) {
  const btn = document.getElementById('search-btn');
  btn.disabled = v;
  btn.textContent = v ? '...' : 'Buscar';
}

function mostrarError(msg) {
  const el = document.getElementById('error-toast');
  el.textContent = '⚠️ ' + msg;
  el.classList.add('visible');
}

function ocultarError() {
  document.getElementById('error-toast').classList.remove('visible');
}
</script>
</body>
</html>
