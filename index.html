<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima para Dummies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --card: rgba(255,255,255,0.07);
  --card-b: rgba(255,255,255,0.15);
  --blur: blur(24px);
  --r: 24px;
  --text: #fff;
  --soft: rgba(255,255,255,0.6);
  --accent: #E8FF57;
  --bg-dark: #090f1a;
}

body {
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  background: var(--bg-dark);
}

/* ─── MESH GRADIENT BG ─── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  background: var(--bg-dark);
  transition: all 2s ease;
}
.bg-mesh {
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.85;
  transition: all 2s ease;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(90px); transition: all 2s ease;
  pointer-events: none;
}

/* ─── PARTICLES ─── */
.particles {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none; overflow: hidden;
}
.raindrop {
  position: absolute; width: 1.5px;
  background: linear-gradient(180deg, transparent 0%, rgba(180,220,255,0.5) 100%);
  animation: rain linear infinite; opacity: 0;
}
@keyframes rain {
  0% { transform: translateY(-30px) skewX(-10deg); opacity:.5; }
  100% { transform: translateY(110vh) skewX(-10deg); opacity:0; }
}
.flake {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.8);
  animation: flakefall linear infinite; opacity: 0;
}
@keyframes flakefall {
  0% { transform: translateY(-10px) translateX(0); opacity:.7; }
  50% { transform: translateY(50vh) translateX(20px); }
  100% { transform: translateY(110vh) translateX(-10px); opacity:0; }
}

/* ─── APP CONTAINER ─── */
.app {
  position: relative; z-index: 10;
  max-width: 680px; margin: 0 auto;
  padding: 30px 20px 100px;
}

/* ─── HEADER ─── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
  animation: dn .5s ease both;
  gap: 12px;
}
.logo {
  font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
  white-space: nowrap;
}
.logo-badge {
  background: var(--accent); color: #0f1b2d;
  border-radius: 6px; padding: 3px 8px;
  font-size: 0.7rem; font-weight: 800; letter-spacing: 0.5px;
  text-transform: uppercase;
}
.geo-btn {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  color: white; border-radius: 50px; padding: 10px 18px;
  font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: all .2s ease; letter-spacing: 0.3px;
  white-space: nowrap;
}
.geo-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }
.geo-icon { width: 14px; height: 14px; }

/* ─── SEARCH ─── */
.search-wrap {
  position: relative; margin-bottom: 28px;
  animation: dn .5s .08s ease both;
  z-index: 100; /* Asegura que el autocompletado vuele por encima de todo */
}
.search-in {
  width: 100%;
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  color: white; border-radius: 50px;
  padding: 16px 52px 16px 24px;
  font-size: 1rem; font-family: 'Syne', sans-serif; font-weight: 400;
  outline: none; transition: all .2s ease;
}
.search-in::placeholder { color: rgba(255,255,255,.35); }
.search-in:focus { border-color: rgba(255,255,255,.45); background: rgba(255,255,255,.12); }
.search-ico {
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  opacity: .6; pointer-events: none;
}
.ac {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: rgba(13, 23, 42, 0.96); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden;
  box-shadow: 0 16px 40px rgba(0,0,0,0.6);
}
.ac-item {
  padding: 14px 22px; cursor: pointer; font-size: .9rem;
  border-bottom: 1px solid rgba(255,255,255,.05);
  transition: background .2s;
  display: flex; align-items: center; gap: 14px;
}
.ac-item:last-child { border: none; }
.ac-item:hover { background: rgba(255,255,255,.08); }
.ac-city { font-weight: 600; color: #fff; }
.ac-sub { font-size: .75rem; opacity: .5; margin-top: 3px; }

/* ─── CLIMA WRAPPER (Previene saltos feos) ─── */
#content {
  display: flex;
  flex-direction: column;
  gap: 16px;
}

/* ─── MAIN CARD ─── */
.main-card {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 30px 28px 26px;
  animation: up .6s ease both;
  position: relative; overflow: hidden;
}
.main-card::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  background: linear-gradient(135deg, rgba(255,255,255,.06) 0%, transparent 60%);
}
.loc-line {
  font-size: .8rem; font-weight: 600; opacity: .6;
  letter-spacing: .8px; text-transform: uppercase;
  margin-bottom: 6px; display: flex; align-items: center; gap: 6px;
}
.city-h {
  font-size: 2.4rem; font-weight: 800; line-height: 1.1;
  letter-spacing: -1px; margin-bottom: 4px;
}
.date-h { font-size: .8rem; opacity: .5; letter-spacing: .3px; margin-bottom: 24px; }

.temp-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
.big-t {
  font-size: 5.8rem; font-weight: 800;
  line-height: 0.95; letter-spacing: -4px;
}
.big-t sup { font-size: 2.2rem; vertical-align: top; top: 10px; opacity: .7; }
.t-meta { text-align: right; padding-top: 6px; }
.feels-t { font-size: .85rem; opacity: .6; margin-bottom: 8px; }
.cond-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.18);
  border-radius: 50px; padding: 6px 16px; font-size: .82rem; font-weight: 600;
}
.w-symbol {
  font-size: 3.2rem; line-height: 1;
  font-family: 'Syne Mono', monospace;
  opacity: .95; margin-bottom: 4px;
}
.hi-lo { font-size: .8rem; opacity: .55; letter-spacing: .2px; }

/* narrative */
.narrative {
  background: rgba(0,0,0,.25); border-left: 3px solid var(--accent);
  border-radius: 0 14px 14px 0; padding: 16px 20px;
  font-size: .95rem; line-height: 1.6; font-weight: 400;
  color: rgba(255,255,255,.9); margin-top: 10px;
}
.nar-loading {
  display: flex; align-items: center; gap: 6px;
  font-size: .85rem; opacity: .5;
}
.dot { width: 5px; height: 5px; border-radius: 50%; background: white; animation: dotpop 1.2s infinite; }
.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }
@keyframes dotpop { 0%,80%,100%{opacity:.2;transform:scale(1)} 40%{opacity:1;transform:scale(1.3)} }

/* ─── STAT GRID ─── */
.stats-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 12px;
}
@media(max-width:480px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
.stat {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: 18px; padding: 16px 12px; text-align: center;
  transition: transform .2s ease;
}
.stat:hover { transform: translateY(-3px); }
.stat-sym { font-size: 1.5rem; line-height: 1; margin-bottom: 6px; font-family: 'Syne Mono', monospace; }
.stat-val { font-size: 1.1rem; font-weight: 700; }
.stat-lbl { font-size: .68rem; opacity: .5; margin-top: 4px; letter-spacing: .5px; text-transform: uppercase; font-weight: 600; }

/* ─── HUMIDITY VISUAL ─── */
.humidity-card {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 22px;
  display: flex; align-items: center; gap: 22px;
}
.hum-circle { position: relative; width: 80px; height: 80px; flex-shrink: 0; }
.hum-circle svg { width: 80px; height: 80px; transform: rotate(-90deg); }
.hum-circle .track { fill: none; stroke: rgba(255,255,255,.1); stroke-width: 6; }
.hum-circle .fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.hum-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.05rem; font-weight: 800;
}
.hum-info { flex: 1; }
.hum-title { font-size: .72rem; opacity: .5; text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 6px; }
.hum-desc { font-size: .92rem; font-weight: 500; line-height: 1.4; color: rgba(255,255,255,0.9); }
.hum-bar-row { display: flex; gap: 4px; margin-top: 12px; }
.hum-seg { height: 5px; flex: 1; border-radius: 3px; background: rgba(255,255,255,.1); }

/* ─── SUN + MOON CARD ─── */
.sun-moon-card {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 22px;
}
.sm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.sm-label { font-size: .72rem; opacity: .5; text-transform: uppercase; letter-spacing: .8px; font-weight: 600; }
.sm-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 14px; align-items: center; margin-bottom: 18px; }
.sm-time { text-align: center; }
.sm-time .time-val { font-size: 1.25rem; font-weight: 700; }
.sm-time .time-lbl { font-size: .7rem; opacity: .5; text-transform: uppercase; margin-top: 3px; font-weight: 600; }
.sun-arc { position: relative; height: 40px; width: 140px; margin: 0 auto; }
.sun-arc-track { position: absolute; inset: 0; height: 40px; overflow: hidden; }
.sun-arc-track svg { width: 100%; height: 80px; }
.arc-path { fill: none; stroke: rgba(255,255,255,.15); stroke-width: 2; stroke-dasharray: 4 4; }
.arc-sun { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; }

.moon-section { border-top: 1px solid rgba(255,255,255,.08); padding-top: 16px; display: flex; align-items: center; gap: 16px; }
.moon-glyph { font-size: 2.2rem; line-height: 1; font-family: 'Syne Mono'; }
.moon-info .moon-phase { font-size: .98rem; font-weight: 700; }
.moon-info .moon-sub { font-size: .75rem; opacity: .45; margin-top: 3px; }
.moon-rise-set { margin-left: auto; text-align: right; font-size: .78rem; opacity: .5; line-height: 1.6; }

/* ─── HOURLY ─── */
.hourly-scroll {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px;
  scrollbar-width: none;
}
.hourly-scroll::-webkit-scrollbar { display: none; }
.h-chip {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: 24px; padding: 14px 16px; text-align: center; min-width: 72px; flex-shrink: 0;
}
.h-chip.now { background: rgba(232,255,87,.14); border-color: rgba(232,255,87,.35); }
.h-t { font-size: .7rem; opacity: .5; margin-bottom: 6px; font-weight: 700; letter-spacing: .3px; }
.h-sym { font-size: 1.2rem; font-family: 'Syne Mono'; margin-bottom: 6px; }
.h-tmp { font-size: .95rem; font-weight: 700; }

/* ─── FORECAST ─── */
.forecast-row {
  display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px;
  scrollbar-width: none;
}
.forecast-row::-webkit-scrollbar { display: none; }
.fc-day {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: 18px; padding: 16px 14px; text-align: center; min-width: 84px; flex-shrink: 0;
  transition: all .2s;
}
.fc-day:hover { transform: translateY(-3px); background: rgba(255,255,255,.12); }
.fc-name { font-size: .7rem; opacity: .5; margin-bottom: 8px; font-weight: 700; text-transform: uppercase; }
.fc-sym { font-size: 1.4rem; font-family: 'Syne Mono'; margin-bottom: 8px; }
.fc-max { font-size: 1.05rem; font-weight: 700; }
.fc-min { font-size: .75rem; opacity: .4; margin-top: 3px; }

/* ─── REC CARD ─── */
.rec-card {
  background: rgba(232,255,87,.06); border: 1px solid rgba(232,255,87,.22);
  backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 20px;
}
.rec-hdr { font-size: .72rem; opacity: .7; letter-spacing: .8px; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; }
.rec-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.rec-pill {
  background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.12);
  border-radius: 30px; padding: 6px 14px; font-size: .85rem; font-weight: 600;
}

/* ─── CHAT ─── */
.chat-wrap {
  background: rgba(0,0,0,0.15); border: 1px solid var(--card-b);
  border-radius: var(--r); padding: 20px; margin-top: 8px;
}
.chat-msgs {
  max-height: 280px; overflow-y: auto; margin-bottom: 14px;
  display: flex; flex-direction: column; gap: 10px; padding-right: 4px;
}
.msg {
  max-width: 85%; padding: 12px 18px; border-radius: 18px;
  font-size: .9rem; line-height: 1.5; animation: msgin .25s ease both;
}
@keyframes msgin { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg.u {
  background: rgba(232,255,87,.14); border: 1px solid rgba(232,255,87,.3);
  align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500;
}
.msg.b {
  background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
  align-self: flex-start; border-bottom-left-radius: 4px;
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip {
  background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.12);
  border-radius: 50px; padding: 6px 14px; font-size: .75rem; cursor: pointer;
  font-weight: 500; transition: all .2s;
}
.chip:hover { background: rgba(232,255,87,.15); border-color: rgba(232,255,87,.35); color: #fff; }
.chat-row { display: flex; gap: 10px; }
.chat-in {
  flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--card-b);
  color: white; border-radius: 50px; padding: 14px 22px;
  font-family: 'Syne', sans-serif; font-size: .92rem; outline: none; transition: border .2s;
}
.chat-in:focus { border-color: rgba(232,255,87,.5); }
.send-btn {
  background: var(--accent); color: #0f1b2d;
  border: none; border-radius: 50%; width: 48px; height: 48px;
  font-size: 1.1rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: transform .2s; font-weight: 700;
}
.send-btn:hover { transform: scale(1.05); }

/* ─── SECTION LABEL ─── */
.sec-lbl { font-size: .72rem; opacity: .45; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-top: 10px; margin-bottom: 4px; }

/* ─── WELCOME ─── */
.welcome {
  text-align: center; padding: 80px 20px;
  animation: up .6s ease both;
}
.welcome-sym { font-size: 4.5rem; font-family: 'Syne Mono'; margin-bottom: 16px; color: var(--accent); }
.welcome h2 { font-size: 2.2rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 12px; }
.welcome p { opacity: .6; font-size: .95rem; line-height: 1.7; max-width: 320px; margin: 0 auto; }

/* ─── ANIMS ─── */
@keyframes dn { from{opacity:0;transform:translateY(-12px)} to{opacity:1;transform:none} }
@keyframes up { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="bg-mesh" id="mesh">
  <div class="orb" id="orb1" style="width:500px;height:500px;top:-150px;right:-100px;"></div>
  <div class="orb" id="orb2" style="width:400px;height:400px;bottom:-100px;left:-100px;"></div>
  <div class="orb" id="orb3" style="width:250px;height:250px;top:40%;left:40%;"></div>
</div>
<div class="particles" id="particles"></div>

<div class="app">
  <div class="header">
    <div class="logo">Clima <span class="logo-badge">para dummies</span></div>
    <button class="geo-btn" id="geoBtn">
      <svg class="geo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
      Mi ubicación
    </button>
  </div>

  <div class="search-wrap">
    <input class="search-in" id="srch" type="text" placeholder="Buscar ciudad, ej: Buenos Aires..." autocomplete="off">
    <span class="search-ico">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </span>
    <div class="ac" id="ac" style="display:none"></div>
  </div>

  <div id="content">
    <div class="welcome">
      <div class="welcome-sym">☀</div>
      <h2>Clima para Dummies</h2>
      <p>Sin tecnicismos pesados. Sin vueltas.<br>Buscá tu ciudad o usá tu ubicación para ver qué onda el día hoy.</p>
    </div>
  </div>
</div>

<script>
let wd = null, loc = null, acTimer = null;
let chatHist = [];

// Símbolos alternativos limpios
function wSym(code, day=true) {
  if (code===0) return day ? '☀' : '☽';
  if (code<=2) return day ? '⛅' : '☁';
  if (code===3) return '☁';
  if ([45,48].includes(code)) return '◎';
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return '⛆';
  if ([71,73,75,77,85,86].includes(code)) return '❄';
  if ([95,96,99].includes(code)) return '⚡';
  return '~';
}

function wText(code) {
  const m={0:'Despejado',1:'Casi despejado',2:'Algo nublado',3:'Nublado',45:'Niebla',48:'Niebla con escarcha',51:'Llovizna leve',53:'Llovizna',55:'Llovizna fuerte',61:'Lluvia leve',63:'Lluvia',65:'Lluvia fuerte',71:'Nieve leve',73:'Nieve',75:'Nieve fuerte',77:'Granizo',80:'Chaparrones',81:'Chaparrones mod.',82:'Chaparrones fuertes',85:'Nevadas',86:'Nevadas fuertes',95:'Tormenta',96:'Tormenta con granizo',99:'Tormenta severa'};
  return m[code]||'Variable';
}

function moonPhase(date) {
  const phases = [
    {name:'Luna Nueva',glyph:'●',days:[0,1]},
    {name:'Creciente',glyph:'◐',days:[2,6]},
    {name:'Cuarto Creciente',glyph:'◑',days:[7,8]},
    {name:'Gibosa Creciente',glyph:'◕',days:[9,13]},
    {name:'Luna Llena',glyph:'○',days:[14,15]},
    {name:'Gibosa Menguante',glyph:'◔',days:[16,20]},
    {name:'Cuarto Menguante',glyph:'◒',days:[21,22]},
    {name:'Menguante',glyph:'◓',days:[23,28]},
  ];
  const synodic = 29.53;
  const known = new Date('2000-01-06');
  const diff = (date - known) / (1000*60*60*24);
  const cycle = ((diff % synodic) + synodic) % synodic;
  const day = Math.floor(cycle);
  for (const p of phases) {
    if (day >= p.days[0] && day <= p.days[1]) return {...p, cycle: cycle/synodic};
  }
  return phases[0];
}

function humDesc(h) {
  if (h < 30) return { text: 'Ambiente hiper seco. Hidratate bien la piel.', color: 'rgba(255,180,100,.75)' };
  if (h < 50) return { text: 'Humedad ideal. El aire se siente impecable y liviano.', color: 'rgba(100,220,150,.75)' };
  if (h < 70) return { text: 'Un toque de humedad. La pesadez se nota sutilmente.', color: 'rgba(100,180,255,.75)' };
  if (h < 85) return { text: 'Bastante espeso. Vas a transpirar bastante más hoy.', color: 'rgba(100,140,255,.75)' };
  return { text: 'Humedad por las nubes. El calor se vuelve ultra agobiante.', color: 'rgba(180,100,255,.75)' };
}

const THEMES = {
  sunny:  { bg:'#0a1628', o1:'rgba(255,200,50,.25)', o2:'rgba(50,120,255,.15)', o3:'rgba(255,150,0,.1)', px:'none' },
  cloudy: { bg:'#111a28', o1:'rgba(100,130,160,.2)', o2:'rgba(60,80,110,.15)', o3:'rgba(80,100,130,.1)', px:'none' },
  rainy:  { bg:'#0a1120', o1:'rgba(40,80,200,.25)', o2:'rgba(20,50,150,.2)', o3:'rgba(60,100,220,.1)', px:'rain' },
  stormy: { bg:'#050810', o1:'rgba(80,0,160,.25)', o2:'rgba(20,30,80,.3)', o3:'rgba(150,50,255,.1)', px:'rain' },
  snowy:  { bg:'#0f1724', o1:'rgba(180,210,255,.2)', o2:'rgba(100,140,200,.15)', o3:'rgba(200,220,255,.08)', px:'snow' },
  foggy:  { bg:'#101824', o1:'rgba(120,140,160,.2)', o2:'rgba(80,100,130,.15)', o3:'rgba(100,120,150,.08)', px:'none' },
  night:  { bg:'#030710', o1:'rgba(50,30,120,.2)', o2:'rgba(20,10,60,.2)', o3:'rgba(80,60,180,.08)', px:'none' },
};

function getThemeKey(code, day) {
  if (!day) return 'night';
  if ([95,96,99].includes(code)) return 'stormy';
  if ([61,63,65,80,81,82].includes(code)) return 'rainy';
  if ([71,73,75,77,85,86].includes(code)) return 'snowy';
  if ([45,48].includes(code)) return 'foggy';
  if ([1,2,3].includes(code)) return 'cloudy';
  return 'sunny';
}

function applyTheme(code, day) {
  const k = getThemeKey(code, day);
  const t = THEMES[k] || THEMES.sunny;
  document.getElementById('bg').style.background = t.bg;
  document.getElementById('orb1').style.background = `radial-gradient(circle, ${t.o1} 0%, transparent 70%)`;
  document.getElementById('orb2').style.background = `radial-gradient(circle, ${t.o2} 0%, transparent 70%)`;
  document.getElementById('orb3').style.background = `radial-gradient(circle, ${t.o3} 0%, transparent 70%)`;
  setupPx(t.px);
}

function setupPx(type) {
  const p = document.getElementById('particles');
  p.querySelectorAll('.raindrop,.flake').forEach(e=>e.remove());
  if (type==='rain') {
    for(let i=0;i<40;i++){
      const d=document.createElement('div'); d.className='raindrop';
      d.style.cssText=`left:${Math.random()*100}vw;height:${15+Math.random()*15}px;animation-duration:${.4+Math.random()*.3}s;animation-delay:${Math.random()*2}s`;
      p.appendChild(d);
    }
  } else if (type==='snow') {
    for(let i=0;i<25;i++){
      const s=document.createElement('div'); s.className='flake';
      const sz=2+Math.random()*3;
      s.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;animation-duration:${3+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
      p.appendChild(s);
    }
  }
}

async function fetchWeather(lat, lon, name, country) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,precipitation,weather_code,is_day,uv_index&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,uv_index_max,wind_speed_10m_max&timezone=auto&forecast_days=7`;
  try {
    const r = await fetch(url); 
    wd = await r.json();
    loc = {name, country, lat, lon};
    chatHist = [];
    render();
  } catch (err) {
    alert("Error al traer los datos del tiempo. Reintentá.");
  }
}

function render() {
  const c = wd.current, d = wd.daily, h = wd.hourly;
  const day = c.is_day===1;
  applyTheme(c.weather_code, day);

  const now = new Date();
  const dStr = now.toLocaleDateString('es-ES',{weekday:'long',day:'numeric',month:'long'});

  const sr=new Date(d.sunrise[0]), ss=new Date(d.sunset[0]);
  const srS=sr.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const ssS=ss.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const pct=Math.min(100,Math.max(0,(now-sr)/(ss-sr)*100));

  const moon = moonPhase(now);
  const moonRise = new Date(ss.getTime() + 60*60*1000);
  const moonSet  = new Date(sr.getTime() + 60*60*1000);
  const mrS = moonRise.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  const msS = moonSet.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});

  const hum = c.relative_humidity_2m;
  const humD = humDesc(hum);
  const humSegs = Math.round(hum/10);

  let hHtml=''; let cnt=0;
  for(let i=0; i<h.time.length && cnt<12; i++){
    const t=new Date(h.time[i]);
    if(t < now - 3600000) continue;
    const isNow=cnt===0;
    const lbl=isNow?'AHORA':t.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    const hDay=t.getHours()>6 && t.getHours()<20;
    hHtml+=`<div class="h-chip${isNow?' now':''}">
      <div class="h-t">${lbl}</div>
      <div class="h-sym">${wSym(h.weather_code[i],hDay)}</div>
      <div class="h-tmp">${Math.round(h.temperature_2m[i])}°</div>
    </div>`;
    cnt++;
  }

  const dns=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let fcHtml='';
  for(let i=0;i<7;i++){
    const nd=new Date(d.time[i]);
    const lbl=i===0?'HOY':i===1?'MAÑANA':dns[nd.getDay()].toUpperCase();
    fcHtml+=`<div class="fc-day">
      <div class="fc-name">${lbl}</div>
      <div class="fc-sym">${wSym(d.weather_code[i])}</div>
      <div class="fc-max">${Math.round(d.temperature_2m_max[i])}°</div>
      <div class="fc-min">${Math.round(d.temperature_2m_min[i])}°</div>
    </div>`;
  }

  const recs = getRecs(c, d);
  const arcPct = pct/100;
  const C=2*Math.PI*34, filled=C*(hum/100);

  // Inyección limpia reescribiendo la maqueta entera para evitar superposiciones
  document.getElementById('content').innerHTML = `
  <div class="main-card">
    <div class="loc-line">
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
      ${loc.country || 'Desconocido'}
    </div>
    <div class="city-h">${loc.name}</div>
    <div class="date-h">${dStr.charAt(0).toUpperCase()+dStr.slice(1)}</div>
    <div class="temp-row">
      <div>
        <div class="big-t">${Math.round(c.temperature_2m)}<sup>°</sup></div>
        <div class="feels-t">Se siente de ${Math.round(c.apparent_temperature)}°</div>
        <div class="cond-pill">${wSym(c.weather_code,day)} &nbsp;${wText(c.weather_code)}</div>
      </div>
      <div class="t-meta">
        <div class="w-symbol">${wSym(c.weather_code,day)}</div>
        <div class="hi-lo">▲ ${Math.round(d.temperature_2m_max[0])}° &nbsp; ▼ ${Math.round(d.temperature_2m_min[0])}°</div>
      </div>
    </div>
    <div class="narrative" id="nar">${fallbackNar(c,d)}</div>
  </div>

  <div class="stats-grid">
    <div class="stat">
      <div class="stat-sym">≋</div>
      <div class="stat-val">${Math.round(c.wind_speed_10m)} km/h</div>
      <div class="stat-lbl">Viento</div>
    </div>
    <div class="stat">
      <div class="stat-sym">◉</div>
      <div class="stat-val">${d.precipitation_sum[0]} mm</div>
      <div class="stat-lbl">Lluvia</div>
    </div>
    <div class="stat">
      <div class="stat-sym">◈</div>
      <div class="stat-val">UV ${Math.round(d.uv_index_max[0])}</div>
      <div class="stat-lbl">Índice UV</div>
    </div>
    <div class="stat">
      <div class="stat-sym">▲</div>
      <div class="stat-val">${Math.round(d.wind_speed_10m_max[0])} km/h</div>
      <div class="stat-lbl">Ráfagas max</div>
    </div>
  </div>

  <div class="humidity-card">
    <div class="hum-circle">
      <svg viewBox="0 0 80 80">
        <circle class="track" cx="40" cy="40" r="34"/>
        <circle class="fill" cx="40" cy="40" r="34"
          stroke="${humD.color}"
          stroke-dasharray="${C}"
          stroke-dashoffset="${C - filled}"
          transform="rotate(-90 40 40)"/>
      </svg>
      <div class="hum-num">${hum}%</div>
    </div>
    <div class="hum-info">
      <div class="hum-title">Humedad Ambiente</div>
      <div class="hum-desc">${humD.text}</div>
      <div class="hum-bar-row">
        ${Array.from({length:10},(_,i)=>`<div class="hum-seg" style="${i<humSegs?`background:${humD.color}`:''}"></div>`).join('')}
      </div>
    </div>
  </div>

  <div class="sun-moon-card">
    <div class="sm-header">
      <span class="sm-label">Sol y Luna</span>
    </div>
    <div class="sm-row">
      <div class="sm-time">
        <div class="time-val">${srS}</div>
        <div class="time-lbl">Amanecer</div>
      </div>
      <div class="sun-arc">
        <div class="sun-arc-track">
          <svg viewBox="0 0 220 55" preserveAspectRatio="none">
            <path class="arc-path" d="M 20 50 A 90 90 0 0 1 200 50"/>
            <circle cx="${(20+(180*Math.min(1,Math.max(0,arcPct)))).toFixed(1)}" cy="${(50-Math.sin(Math.min(1,Math.max(0,arcPct)))*Math.PI*25).toFixed(1)}" r="6" fill="#E8FF57"/>
          </svg>
        </div>
      </div>
      <div class="sm-time" style="text-align:right">
        <div class="time-val">${ssS}</div>
        <div class="time-lbl">Atardecer</div>
      </div>
    </div>
    <div class="moon-section">
      <div class="moon-glyph">${moon.glyph}</div>
      <div class="moon-info">
        <div class="moon-phase">${moon.name}</div>
        <div class="moon-sub">${Math.round(moon.cycle*100)}% del ciclo completado</div>
      </div>
      <div class="moon-rise-set">
        <div>Sale: ~ ${mrS}</div>
        <div>Baja: ~ ${msS}</div>
      </div>
    </div>
  </div>

  <div class="sec-lbl">El día hora por hora</div>
  <div class="hourly-scroll">${hHtml}</div>

  <div class="sec-lbl">Pronóstico extendido</div>
  <div class="forecast-row">${fcHtml}</div>

  <div class="rec-card">
    <div class="rec-hdr">— Qué meter en la mochila hoy</div>
    <div class="rec-pills">${recs}</div>
  </div>

  <div class="chat-wrap">
    <div class="sec-lbl">Consultale al asistente de clima</div>
    <div class="chips">
      <span class="chip" onclick="sq('¿Necesito paraguas mañana?')">¿Paraguas mañana?</span>
      <span class="chip" onclick="sq('¿Cuál es el mejor momento para salir hoy?')">¿Cuándo conviene salir?</span>
      <span class="chip" onclick="sq('¿Cómo se viene el fin de semana?')">¿Qué tal el finde?</span>
      <span class="chip" onclick="sq('¿Está lindo para entrenar afuera?')">¿Deporte afuera?</span>
    </div>
    <div class="chat-msgs" id="cm"></div>
    <div class="chat-row">
      <input class="chat-in" id="ci" placeholder="Preguntale lo que quieras sobre el tiempo..." onkeydown="if(event.key==='Enter')sc()">
      <button class="send-btn" onclick="sc()">➔</button>
    </div>
  </div>
  `;
}

function getRecs(c, d) {
  const items=[], t=c.temperature_2m, rain=d.precipitation_sum[0], wind=c.wind_speed_10m, uv=d.uv_index_max[0], hum=c.relative_humidity_2m;
  if(t<6){items.push('Campera bien gruesa');items.push('Bufanda / Guantes');}
  else if(t<13){items.push('Campera abrigada');}
  else if(t<19){items.push('Buzo o camperita liviana');}
  else if(t<25){items.push('Ropa ligera de media estación');}
  else{items.push('Ropa fresca de verano');}
  if(rain>1.5) items.push('Paraguas o piloto sí o sí');
  if(wind>32) items.push('Ojo con las ráfagas de viento');
  if(uv>=6) items.push('Protector solar factor alto');
  else if(uv>=3) items.push('Ponte un poco de protector');
  if(t>29) items.push('Botella de agua fría constante');
  if(hum>82 && t>24) items.push('Ropa bien transpirable');
  return items.map(i=>`<span class="rec-pill">${i}</span>`).join('');
}

// Narrativa simplificada en Español Rioplatense sin pegarle a APIs externas caóticas en frontend
function fallbackNar(c, d) {
  const t=Math.round(c.temperature_2m), feels=Math.round(c.apparent_temperature), code=c.weather_code, hum=c.relative_humidity_2m;
  let txt = `Está ${wText(code).toLowerCase()} con unos ${t}°C. `;
  
  if (Math.abs(t - feels) >= 3) {
    txt += `Ojo que por la humedad o el viento la sensación real es de ${feels}°C, así que no te fíes del termómetro. `;
  } else {
    txt += `La sensación está bastante alineada con la temperatura real. `;
  }

  if ([61,63,65,80,81,82,95,96,99].includes(code)) {
    return txt + "Hay agua dando vueltas, meté paraguas si no querés terminar empapado.";
  }
  if (hum > 80 && t > 23) {
    return txt + "Está re pesado y pegajoso afuera. Se sufre un toque si te movés mucho.";
  }
  if (t < 14) {
    return txt + "Día fresquito, ideal para salir bien abrigado y tomarse un café caliente.";
  }
  return txt + "Dentro de todo un lindo día, super aprovechable para encarar lo que tengas que hacer.";
}

// ─── CHAT CONVERSACIONAL INTEGRADO (Simulado local para evitar fallas de CORS) ───
function sc() {
  const inp=document.getElementById('ci'), msg=inp.value.trim();
  if(!msg || !wd) return;
  inp.value='';
  addM(msg,'u');
  
  setTimeout(() => {
    let r = "Mirá, el clima está cambiando un poco, pero lo clave es que uses ropa cómoda según lo que ves arriba.";
    const mLow = msg.toLowerCase();
    
    if (mLow.includes('paraguas') || mLow.includes('lluvia') || mLow.includes('llover')) {
      r = wd.daily.precipitation_sum[0] > 1 
        ? "Y sí, yo que vos metería un paraguas en la mochila porque hay chances reales de agua." 
        : "Por ahora viene zafando, no parece que vaya a llover fuerte hoy.";
    } else if (mLow.includes('salir') || mLow.includes('momento') || mLow.includes('hora')) {
      r = "Fijate en el panel de las próximas horas; el momento con temperatura más agradable y menos viento va a ser el ideal.";
    } else if (mLow.includes('fin de semana') || mLow.includes('finde')) {
      r = "Para el finde viene bastante parecido, tirando a " + wText(wd.daily.weather_code[1]).toLowerCase() + ". Monitorealo antes de armar planes largos.";
    } else if (mLow.includes('deporte') || mLow.includes('entrenar') || mLow.includes('afuera')) {
      r = wd.current.temperature_2m > 28 
        ? "Hace bastante calor ahora mismo, si vas a entrenar afuera hidratate muy bien o esperá a que baje el sol." 
        : "Está re lindo para meter plaza o salir a correr un rato, ¡aprovechalo!";
    }
    addM(r,'b');
  }, 450);
}

function sq(q){ document.getElementById('ci').value=q; sc(); }
function addM(t,cls){
  const div=document.getElementById('cm'), m=document.createElement('div');
  m.className=`msg ${cls}`; m.textContent=t;
  div.appendChild(m); div.scrollTop=div.scrollHeight;
}

// ─── GEOLOCALIZACIÓN REPARADA ───
document.getElementById('geoBtn').onclick=()=> {
  if(!navigator.geolocation) return;
  document.getElementById('geoBtn').textContent='Detectando...';
  navigator.geolocation.getCurrentPosition(async pos=>{
    const {latitude:lat,longitude:lon}=pos.coords;
    try {
      const nr=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`);
      const nd=await nr.json();
      const city=nd.address.city||nd.address.town||nd.address.village||nd.address.municipality||'Mi ubicación';
      const country=nd.address.country||'';
      document.getElementById('geoBtn').textContent=city;
      document.getElementById('srch').value=city;
      fetchWeather(lat,lon,city,country);
    } catch { fetchWeather(lat,lon,'Mi ubicación',''); }
  },()=>{
    document.getElementById('geoBtn').textContent='Mi ubicación';
    alert("No se pudo acceder a tu ubicación. Buscá manualmente.");
  });
};

// ─── AUTOCOMPLETADO OPTIMIZADO (Sin superposiciones) ───
document.getElementById('srch').addEventListener('input',function(){
  clearTimeout(acTimer);
  const q=this.value.trim();
  if(q.length<2){document.getElementById('ac').style.display='none';return;}
  acTimer=setTimeout(async()=>{
    try {
      const r=await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=es`);
      const d=await r.json(); const res=d.results||[];
      const ac=document.getElementById('ac');
      if(!res.length){ac.style.display='none';return;}
      ac.innerHTML=res.map(r=>`<div class="ac-item" onclick="selCity(${r.latitude},${r.longitude},'${r.name.replace(/'/g,"\\'")}', '${(r.country||"").replace(/'/g,"\\'")}')">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" opacity=".5"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
        <div><div class="ac-city">${r.name}${r.admin1?', '+r.admin1:''}</div><div class="ac-sub">${r.country||''}</div></div>
      </div>`).join('');
      ac.style.display='block';
    } catch(e) { console.error(e); }
  },250);
});

// Cerrar autocompletado si se clickea afuera
document.addEventListener('click',e=>{ if(!e.target.closest('.search-wrap')) document.getElementById('ac').style.display='none'; });

function selCity(lat,lon,name,country){
  document.getElementById('srch').value=name;
  document.getElementById('ac').style.display='none';
  fetchWeather(lat,lon,name,country);
}
