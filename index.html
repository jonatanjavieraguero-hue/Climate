<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima para Dummies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --card: rgba(255,255,255,0.07);
  --card-b: rgba(255,255,255,0.15);
  --blur: blur(24px);
  --r: 24px;
  --text: #fff;
  --soft: rgba(255,255,255,0.6);
  --accent: #E8FF57;
  --bg-dark: #090f1a;
}

body {
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  background: var(--bg-dark);
}

.bg { position: fixed; inset: 0; z-index: 0; background: var(--bg-dark); transition: all 2s ease; }
.bg-mesh { position: fixed; inset: 0; z-index: 0; opacity: 0.85; transition: all 2s ease; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); transition: all 2s ease; pointer-events: none; }
.particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }

.raindrop {
  position: absolute; width: 1.5px;
  background: linear-gradient(180deg, transparent 0%, rgba(180,220,255,0.5) 100%);
  animation: rain linear infinite; opacity: 0;
}
@keyframes rain {
  0% { transform: translateY(-30px) skewX(-10deg); opacity:.5; }
  100% { transform: translateY(110vh) skewX(-10deg); opacity:0; }
}
.flake {
  position: absolute; border-radius: 50%; background: rgba(255,255,255,0.8);
  animation: flakefall linear infinite; opacity: 0;
}
@keyframes flakefall {
  0% { transform: translateY(-10px) translateX(0); opacity:.7; }
  50% { transform: translateY(50vh) translateX(20px); }
  100% { transform: translateY(110vh) translateX(-10px) opacity:0; }
}

.app { position: relative; z-index: 10; max-width: 680px; margin: 0 auto; padding: 20px 16px 80px; }


.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; gap: 12px; position: relative; }
.logo-wrap { position: relative; cursor: pointer; }
.logo { font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 6px; }
.logo-badge { background: var(--accent); color: #0f1b2d; border-radius: 6px; padding: 3px 8px; font-size: 0.68rem; font-weight: 800; text-transform: uppercase; }

/* Menú desplegable del Logo */
.logo-menu {
  position: absolute; top: calc(100% + 8px); left: 0; 
  background: rgba(15, 27, 45, 0.95); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid var(--card-b); border-radius: 14px; padding: 6px; display: none; z-index: 200; box-shadow: 0 10px 30px rgba(0,0,0,0.5); min-width: 180px;
}
.logo-menu button {
  width: 100%; background: none; border: none; color: white; padding: 10px 14px; text-align: left;
  font-family: 'Syne', sans-serif; font-size: 0.85rem; cursor: pointer; border-radius: 8px; display: flex; align-items: center; gap: 8px;
}
.logo-menu button:hover { background: rgba(255,255,255,0.1); color: var(--accent); }

.geo-btn {
  background: var(--accent); color: #0f1b2d; border: none;
  border-radius: 50px; padding: 10px 16px; font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 6px; transition: all .2s ease; white-space: nowrap; box-shadow: 0 4px 15px rgba(232,255,87,0.2);
}
.geo-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,255,87,0.3); }

.search-wrap { position: relative; margin-bottom: 24px; z-index: 100; }
.search-in {
  width: 100%; background: var(--card); border: 1px solid var(--card-b); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  color: white; border-radius: 50px; padding: 15px 50px 15px 22px; font-size: 0.95rem; font-family: 'Syne', sans-serif; outline: none; transition: all .2s ease;
}
.search-in::placeholder { color: rgba(255,255,255,.4); }
.search-in:focus { border-color: rgba(255,255,255,.5); background: rgba(255,255,255,.12); }
.search-ico { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); opacity: .5; pointer-events: none; }

.ac {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0;
  background: rgba(10, 18, 32, 0.98); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden; box-shadow: 0 12px 35px rgba(0,0,0,0.6);
}
.ac-item { padding: 14px 20px; cursor: pointer; font-size: .9rem; border-bottom: 1px solid rgba(255,255,255,.05); transition: background .2s; display: flex; align-items: center; gap: 12px; }
.ac-item:last-child { border: none; }
.ac-item:hover { background: rgba(255,255,255,.08); }
.ac-city { font-weight: 600; color: #fff; }
.ac-sub { font-size: .75rem; opacity: .5; margin-top: 2px; }

#content { display: flex; flex-direction: column; gap: 16px; }

.hero-narrative-card {
  background: linear-gradient(135deg, rgba(232,255,87,0.1) 0%, rgba(255,255,255,0.03) 100%);
  border: 2px solid rgba(232,255,87,0.25); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 28px 24px; position: relative; overflow: hidden;
}
.hero-loc { font-size: .8rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.hero-text { font-size: 1.25rem; font-weight: 600; line-height: 1.45; color: #ffffff; }

.name-trigger-btn { font-size: 0.72rem; background: rgba(255,255,255,0.08); padding: 5px 12px; border-radius: 6px; display: inline-block; margin-top: 14px; cursor: pointer; opacity: 0.7; border: 1px solid transparent; }
.name-trigger-btn:hover { opacity: 1; background: rgba(255,255,255,0.15); border-color: rgba(255,255,255,0.1); }

.mini-weather-row { display: flex; align-items: center; justify-content: space-between; margin-top: 20px; padding-top: 18px; border-top: 1px solid rgba(255,255,255,0.08); }
.mini-temp { font-size: 3.2rem; font-weight: 800; letter-spacing: -1.5px; line-height: 1; }
.mini-temp sup { font-size: 1.3rem; opacity: .7; }
.mini-meta { text-align: right; }
.mini-cond { font-weight: 700; background: rgba(255,255,255,0.1); padding: 5px 12px; border-radius: 50px; font-size: .8rem; display: inline-block; margin-bottom: 4px; }
.mini-hl { font-size: .78rem; opacity: .5; }

.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
@media(max-width:480px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
.stat { background: var(--card); border: 1px solid var(--card-b); border-radius: 16px; padding: 14px 10px; text-align: center; }
.stat-sym { font-size: 1.3rem; font-family: 'Syne Mono'; margin-bottom: 4px; }
.stat-val { font-size: 1.05rem; font-weight: 700; }
.stat-lbl { font-size: .65rem; opacity: .5; margin-top: 2px; text-transform: uppercase; font-weight: 600; }

.humidity-card { background: var(--card); border: 1px solid var(--card-b); border-radius: var(--r); padding: 20px; display: flex; align-items: center; gap: 18px; }
.hum-circle { position: relative; width: 65px; height: 65px; flex-shrink: 0; }
.hum-circle svg { width: 65px; height: 65px; transform: rotate(-90deg); }
.hum-circle .track { fill: none; stroke: rgba(255,255,255,.1); stroke-width: 6; }
.hum-circle .fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.hum-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 800; }
.hum-desc { font-size: .88rem; color: rgba(255,255,255,0.8); margin-top: 3px; }

.hourly-scroll, .forecast-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
.hourly-scroll::-webkit-scrollbar, .forecast-row::-webkit-scrollbar { display: none; }
.h-chip { background: var(--card); border: 1px solid var(--card-b); border-radius: 20px; padding: 12px 14px; text-align: center; min-width: 68px; }
.h-chip.now { background: rgba(232,255,87,.12); border-color: rgba(232,255,87,.3); }
.h-t { font-size: .65rem; opacity: .5; font-weight: 700; }
.h-sym { font-size: 1.1rem; font-family: 'Syne Mono'; margin: 2px 0; }
.h-tmp { font-size: .9rem; font-weight: 700; }

.fc-day { background: var(--card); border: 1px solid var(--card-b); border-radius: 16px; padding: 14px 12px; text-align: center; min-width: 80px; flex: 1; }
.fc-name { font-size: .65rem; opacity: .5; font-weight: 700; }
.fc-sym { font-size: 1.2rem; font-family: 'Syne Mono'; margin: 4px 0; }
.fc-max { font-size: 1rem; font-weight: 700; }
.fc-min { font-size: .72rem; opacity: .4; }

.rec-card { background: rgba(232,255,87,.04); border: 1px solid rgba(232,255,87,.15); border-radius: var(--r); padding: 18px; }
.rec-hdr { font-size: .7rem; opacity: .6; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }
.rec-pills { display: flex; flex-wrap: wrap; gap: 6px; }
.rec-pill { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.08); border-radius: 30px; padding: 5px 12px; font-size: .8rem; font-weight: 600; }

.chat-wrap { background: rgba(0,0,0,0.15); border: 1px solid var(--card-b); border-radius: var(--r); padding: 18px; }
.chat-msgs { max-height: 240px; overflow-y: auto; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; }
.msg { max-width: 85%; padding: 10px 16px; border-radius: 16px; font-size: .88rem; line-height: 1.45; animation: msgin .2s ease both; }
@keyframes msgin { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.msg.u { background: rgba(232,255,87,.12); border: 1px solid rgba(232,255,87,.25); align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.b { background: rgba(255,255,255,.04); border: 1px solid rgba(255,255,255,.08); align-self: flex-start; border-bottom-left-radius: 4px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.08); border-radius: 50px; padding: 5px 12px; font-size: .72rem; cursor: pointer; }
.chip:hover { background: rgba(232,255,87,.12); border-color: var(--accent); }
.chat-row { display: flex; gap: 8px; }
.chat-in { flex: 1; background: rgba(0,0,0,0.25); border: 1px solid var(--card-b); color: white; border-radius: 50px; padding: 12px 20px; font-family: 'Syne', sans-serif; font-size: .88rem; outline: none; }
.send-btn { background: var(--accent); color: #0f1b2d; border: none; border-radius: 50%; width: 42px; height: 42px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }

.sec-lbl { font-size: .68rem; opacity: .45; letter-spacing: 1px; text-transform: uppercase; font-weight: 700; margin-top: 8px; margin-bottom: 4px; }
.welcome { text-align: center; padding: 50px 16px; }
.welcome-sym { font-size: 4rem; font-family: 'Syne Mono'; margin-bottom: 12px; color: var(--accent); }
.welcome h2 { font-size: 1.8rem; font-weight: 800; margin-bottom: 8px; }
.welcome p { opacity: .6; font-size: .9rem; line-height: 1.6; max-width: 300px; margin: 0 auto 16px; }

/* Modal sutil para configurar nombre */
.name-modal {
  position: fixed; inset: 0; background: rgba(5,10,20,0.8); backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px;
}
.modal-box { background: #0f1b2d; border: 1px solid var(--card-b); padding: 24px; border-radius: var(--r); width: 100%; max-width: 360px; text-align: center; }
.modal-box h3 { margin-bottom: 8px; font-weight: 800; }
.modal-box p { font-size: 0.85rem; opacity: 0.6; margin-bottom: 16px; }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="bg-mesh" id="mesh">
  <div class="orb" id="orb1" style="width:450px;height:450px;top:-150px;right:-100px;"></div>
  <div class="orb" id="orb2" style="width:350px;height:350px;bottom:-100px;left:-100px;"></div>
  <div class="orb" id="orb3" style="width:200px;height:200px;top:40%;left:40%;"></div>
</div>
<div class="particles" id="particles"></div>

<div class="app">
  <div class="header">
    <div class="logo-wrap" id="logoWrap">
      <div class="logo">Clima <span class="logo-badge">Dummies ▼</span></div>
      <div class="logo-menu" id="logoMenu">
        <button onclick="refreshCurrentWeather(event)">🔄 Refrescar clima</button>
        <button onclick="cleanForSearch(event)">🔍 Buscar otro lugar</button>
      </div>
    </div>
    <button class="geo-btn" id="geoBtn">📍 Usar mi ubi</button>
  </div>

  <div class="search-wrap">
    <input class="search-in" id="srch" type="text" placeholder="Buscá pueblos, playas, ciudades..." autocomplete="off">
    <span class="search-ico">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </span>
    <div class="ac" id="ac" style="display:none"></div>
  </div>

  <div id="content">
    <div class="welcome">
      <div class="welcome-sym">☀</div>
      <h2>Clima para Dummies</h2>
      <p>Rastreando tu ubicación para darte el reporte express...</p>
    </div>
  </div>
</div>

<!-- Modal oculto para cambiar nombre opcionalmente -->
<div class="name-modal" id="nmModal" style="display: none;">
  <div class="modal-box">
    <h3>¿Cómo te llamás?</h3>
    <p>Opcional. Si lo dejas vacío, te llamaré de formas ramdom muy copadas.</p>
    <input class="name-in" id="modalNameIn" type="text" style="width:100%; background:rgba(0,0,0,0.4); border:1px solid var(--card-b); color:white; border-radius:50px; padding:12px 20px; font-family:'Syne'; outline:none; text-align:center; margin-bottom:14px;" placeholder="Tu nombre o apodo...">
    <div style="display:flex; gap:8px;">
      <button class="geo-btn" style="flex:1; justify-content:center; background:rgba(255,255,255,0.1); color:white;" onclick="closeNameModal()">Cancelar</button>
      <button class="geo-btn" style="flex:1; justify-content:center;" onclick="saveName()">Guardar</button>
    </div>
  </div>
</div>

<script>
let wd = null, loc = null, acTimer = null;
let userName = localStorage.getItem('dummy_name') || '';

// Palabras clave aleatorias cuando el usuario no configuró su nombre
const RANDOM_SLANGS = ['mae', 'che', 'parce', 'maje', 'amigo', 'amiga', 'mi amor', 'hermano', 'titán', 'crack', 'fiera'];

function getDynamicGreeting() {
  if (userName) return userName;
  return RANDOM_SLANGS[Math.floor(Math.random() * RANDOM_SLANGS.length)];
}

function wSym(code, day=true) {
  if (code===0) return day ? '☀' : '☽';
  if (code subdivision <= 2) return day ? '⛅' : '☁';
  if (code===3) return '☁';
  if ([45,48].includes(code)) return '◎';
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return '⛆';
  if ([71,73,75,77,85,86].includes(code)) return '❄';
  if ([95,96,99].includes(code)) return '⚡';
  return '~';
}

function wText(code) {
  const m={0:'Despejado',1:'Casi despejado',2:'Algo nublado',3:'Nublado',45:'Niebla',48:'Niebla con escarcha',51:'Llovizna leve',53:'Llovizna',55:'Llovizna fuerte',61:'Lluvia leve',63:'Lluvia',65:'Lluvia fuerte',71:'Nieve leve',73:'Nieve',75:'Nieve fuerte',77:'Granizo',80:'Chaparrones',81:'Chaparrones mod.',82:'Chaparrones fuertes',85:'Nevadas',86:'Nevadas fuertes',95:'Tormenta eléctrica',96:'Tormenta con granizo',99:'Tormenta pesada'};
  return m[code]||'Variable';
}

// Generador de respuestas dinámicas con humor y variabilidad alta
function getSlangNarrative(country, code, t, rain) {
  const c = (country || '').toLowerCase();
  const g = getDynamicGreeting();
  
  // Bolsas de frases aleatorias para evitar respuestas repetitivas
  const cr_hot = [
    `¡Pura vida, ${g}! Qué clase de solazo se maneja hoy mae. Te vas a derretir en la acera, legalmente está para buscar una sombrita o una birra.`,
    `¡Diay ${g}! Pegó fuerte el calorón hoy mae. Olvídate de abrigos, salí en shorts o vas a terminar modo sauna viviente.`,
    `¿Todo bien, ${g}? Hace un bochorno de locos mae. El aire está pesado, ideal para no hacer absolutamente nada productivo.`
  ];
  const cr_rain = [
    `¡Gente, ${g}! Se viene un baldazo de agua del copón. Guardá la ropa y sacá los pilotos porque se va a inundar hasta el pensamiento.`,
    `¡Mae ${g}, qué baldazo! Está lloviendo parejo. El cielo se cayó por completo, quédate adentro viendo pelis mejor.`,
    `¡Pura vida ${g}! Tremendo aguacero se armó en un segundo. Clásico de la zona, salí con paraguas o salís a nadar.`
  ];
  const arg_hot = [
    `¡Qué hacés, ${g}! Che, hace un calor de cagarse afuera. Caminás media cuadra y ya sos un charco humano, posta.`,
    `¡Mirá lo que es esto, ${g}! Un horno el día de hoy, ideal para tomarse un tereré bien frío o quedarse pegado al ventilador.`,
    `¡Buenas, ${g}! Te cocinás vivo si salís al sol directo. Tremendo calorazo se mandó hoy.`
  ];
  const arg_rain = [
    `¡Se viene el agua, ${g}! Meté la ropa antes de que se te licúen los calzones en la soga. Tremendo diluvio se armó.`,
    `¡Che ${g}, terrible tormenta! Un embole para andar afuera saltando charcos. Está para tortas fritas y encierro total.`,
    `¡Qué onda, ${g}! Alto diluvio. Se cae el cielo a pedazos, no seas salame y llevate el paraguas.`
  ];
  const gen_neutral = [
    `¡Hola, ${g}! El clima está bastante tranqui, ni fu ni fa. Una temperatura amigable para salir a dar una vuelta sin sufrir.`,
    `¿Qué cuenta la vida, ${g}? Día templado, medio gris pero zafa lindo. Ni te congelás ni te derretís.`,
    `¡Buenas, ${g}! Todo bastante en paz por acá hoy. Podés andar con un bucito liviano y estás re bien.`
  ];

  // Selección inteligente por condiciones
  const isRainy = ([95,96,99].includes(code) || rain > 2);
  
  if (c.includes('costa rica')) {
    if (isRainy) return cr_rain[Math.floor(Math.random() * cr_rain.length)];
    if (t >= 27) return cr_hot[Math.floor(Math.random() * cr_hot.length)];
  } 
  if (c.includes('argentina') || c.includes('uruguay')) {
    if (isRainy) return arg_rain[Math.floor(Math.random() * arg_rain.length)];
    if (t >= 27) return arg_hot[Math.floor(Math.random() * arg_hot.length)];
  }
  
  // Genérico por defecto cambiante
  if (isRainy) return `¡Atención ${g}! Se está cayendo el cielo. Un aguacero de novela, ideal para quedarse adentro durmiendo la siesta.`;
  if (t >= 29) return `¡Uff, ${g}! Qué calorón se siente. Estamos adentro de un microondas, hidratate bien y buscá aire acondicionado.`;
  if (t <= 13) return `¡Hace un frío polar, ${g}! Ponete hasta el poncho porque el viento te congela la nariz en dos segundos.`;
  
  return gen_neutral[Math.floor(Math.random() * gen_neutral.length)];
}

const THEMES = {
  sunny:  { bg:'#0a1628', o1:'rgba(255,200,50,.2)', o2:'rgba(50,120,255,.12)', o3:'rgba(255,150,0,.08)', px:'none' },
  cloudy: { bg:'#111a28', o1:'rgba(100,130,160,.15)', o2:'rgba(60,80,110,.12)', o3:'rgba(80,100,130,.08)', px:'none' },
  rainy:  { bg:'#0a1120', o1:'rgba(40,80,200,.2)', o2:'rgba(20,50,150,.15)', o3:'rgba(60,100,220,.08)', px:'rain' },
  stormy: { bg:'#050810', o1:'rgba(80,0,160,.2)', o2:'rgba(20,30,80,.2)', o3:'rgba(150,50,255,.08)', px:'rain' },
  snowy:  { bg:'#0f1724', o1:'rgba(180,210,255,.15)', o2:'rgba(100,140,200,.12)', o3:'rgba(200,220,255,.05)', px:'snow' },
  night:  { bg:'#030710', o1:'rgba(50,30,120,.15)', o2:'rgba(20,10,60,.15)', o3:'rgba(80,60,180,.05)', px:'none' }
};

function applyTheme(code, day) {
  let k = 'sunny'; if (!day) k = 'night';
  else if ([95,96,99].includes(code)) k = 'stormy';
  else if ([61,63,65,80,81,82].includes(code)) k = 'rainy';
  else if ([71,73,75,77,85,86].includes(code)) k = 'snowy';
  else if ([1,2,3].includes(code)) k = 'cloudy';

  const t = THEMES[k] || THEMES.sunny;
  document.getElementById('bg').style.background = t.bg;
  document.getElementById('orb1').style.background = `radial-gradient(circle, ${t.o1} 0%, transparent 70%)`;
  document.getElementById('orb2').style.background = `radial-gradient(circle, ${t.o2} 0%, transparent 70%)`;
  document.getElementById('orb3').style.background = `radial-gradient(circle, ${t.o3} 0%, transparent 70%)`;
  
  const p = document.getElementById('particles'); p.innerHTML = '';
  if (t.px === 'rain') {
    for(let i=0; i<25; i++){
      const d=document.createElement('div'); d.className='raindrop';
      d.style.cssText=`left:${Math.random()*100}vw;height:${15+Math.random()*15}px;animation-duration:${.4+Math.random()*.3}s;animation-delay:${Math.random()*2}s`;
      p.appendChild(d);
    }
  }
}

async function fetchWeather(lat, lon, name, country) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,precipitation,weather_code,is_day,uv_index&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,uv_index_max&timezone=auto&forecast_days=7`;
  try {
    const r = await fetch(url);
    wd = await r.json();
    loc = {lat, lon, name, country};
    render();
  } catch (err) {
    alert("Error bajando datos climáticos.");
  }
}

// Controladores del Logo Interactivos
document.getElementById('logoWrap').addEventListener('click', function(e) {
  e.stopPropagation();
  const m = document.getElementById('logoMenu');
  m.style.display = m.style.display === 'block' ? 'none' : 'block';
});
document.addEventListener('click', () => { document.getElementById('logoMenu').style.display = 'none'; });

function refreshCurrentWeather(e) {
  e.stopPropagation();
  document.getElementById('logoMenu').style.display = 'none';
  if(loc) fetchWeather(loc.lat, loc.lon, loc.name, loc.country);
  else triggerAutoGeo();
}

function cleanForSearch(e) {
  e.stopPropagation();
  document.getElementById('logoMenu').style.display = 'none';
  document.getElementById('srch').value = '';
  document.getElementById('srch').focus();
  document.getElementById('content').innerHTML = `
    <div class="welcome">
      <div class="welcome-sym">🔍</div>
      <h2>Buscar nuevo lugar</h2>
      <p>Escribí arriba la playa, ciudad o pueblo que quieras chismosear.</p>
    </div>
  `;
}

// Modales de Nombre
function openNameModal() { document.getElementById('nmModal').style.display = 'flex'; }
function closeNameModal() { document.getElementById('nmModal').style.display = 'none'; }
function saveName() {
  const val = document.getElementById('modalNameIn').value.trim();
  userName = val;
  if(val) localStorage.setItem('dummy_name', val);
  else localStorage.removeItem('dummy_name');
  closeNameModal();
  if(loc) fetchWeather(loc.lat, loc.lon, loc.name, loc.country);
}

function render() {
  const c = wd.current, d = wd.daily, h = wd.hourly;
  applyTheme(c.weather_code, c.is_day===1);

  const funnyText = getSlangNarrative(loc.country, c.weather_code, c.temperature_2m, d.precipitation_sum[0]);

  let hHtml=''; let now=new Date(); let cnt=0;
  for(let i=0; i<h.time.length && cnt<8; i++){
    const t=new Date(h.time[i]); if(t < now - 3600000) continue;
    const isNow=cnt===0;
    hHtml+=`<div class="h-chip${isNow?' now':''}">
      <div class="h-t">${isNow?'AHORA':t.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div>
      <div class="h-sym">${wSym(h.weather_code[i], t.getHours()>6 && t.getHours()<20)}</div>
      <div class="h-tmp">${Math.round(h.temperature_2m[i])}°</div>
    </div>`;
    cnt++;
  }

  const dns=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
  let fcHtml='';
  for(let i=0;i<5;i++){
    const nd=new Date(d.time[i]);
    fcHtml+=`<div class="fc-day">
      <div class="fc-name">${i===0?'HOY':i===1?'MAÑANA':dns[nd.getDay()].substring(0,3).toUpperCase()}</div>
      <div class="fc-sym">${wSym(d.weather_code[i])}</div>
      <div class="fc-max">${Math.round(d.temperature_2m_max[i])}°</div>
      <div class="fc-min">${Math.round(d.temperature_2m_min[i])}°</div>
    </div>`;
  }

  const C=2*Math.PI*34, filled=C*(c.relative_humidity_2m/100);

  document.getElementById('content').innerHTML = `
    <div class="hero-narrative-card">
      <div class="hero-loc">📍 ${loc.name}, ${loc.country || 'Planeta Tierra'}</div>
      <div class="hero-text">${funnyText}</div>
      
      <div class="mini-weather-row">
        <div class="mini-temp">${Math.round(c.temperature_2m)}<sup>°C</sup></div>
        <div class="mini-meta">
          <div class="mini-cond">${wText(c.weather_code)}</div>
          <div class="mini-hl">Máx: ${Math.round(d.temperature_2m_max[0])}° | Mín: ${Math.round(d.temperature_2m_min[0])}°</div>
        </div>
      </div>
      <div class="name-trigger-btn" onclick="openNameModal()">⚙ ${userName ? 'Cambiar mi nombre' : 'Configurar mi nombre'}</div>
    </div>

    <div class="stats-grid">
      <div class="stat"><div class="stat-sym">≋</div><div class="stat-val">${Math.round(c.wind_speed_10m)} km/h</div><div class="stat-lbl">Viento</div></div>
      <div class="stat"><div class="stat-sym">◉</div><div class="stat-val">${d.precipitation_sum[0]} mm</div><div class="stat-lbl">Agua</div></div>
      <div class="stat"><div class="stat-sym">◈</div><div class="stat-val">UV ${Math.round(c.uv_index)}</div><div class="stat-lbl">Rayos UV</div></div>
      <div class="stat"><div class="stat-sym">▲</div><div class="stat-val">${Math.round(c.relative_humidity_2m)}%</div><div class="stat-lbl">Humedad</div></div>
    </div>

    <div class="sec-lbl">El día hora por hora</div>
    <div class="hourly-scroll">${hHtml}</div>

    <div class="sec-lbl">Los próximos días</div>
    <div class="forecast-row">${fcHtml}</div>

    <div class="chat-wrap">
      <div class="sec-lbl">Preguntale al asistente de planes</div>
      <div class="chips">
        <span class="chip" onclick="sq('¿Cuál es el mejor día para pelis?')">¿Mejor día para pelis?</span>
        <span class="chip" onclick="sq('¿Qué me cuentas de cómo viene la semana?')">¿Qué me cuentas de la semana?</span>
      </div>
      <div class="chat-msgs" id="cm"></div>
      <div class="chat-row">
        <input class="chat-in" id="ci" placeholder="¿Está para birra, correr o quedarse adentro?..." onkeydown="if(event.key==='Enter')sc()">
        <button class="send-btn" onclick="sc()">➔</button>
      </div>
    </div>
  `;
}

// Cerebro Conversacional Contextual Abierto
function sc() {
  const inp = document.getElementById('ci'), msg = inp.value.trim();
  if(!msg || !wd) return;
  inp.value = ''; addM(msg, 'u');
  
  setTimeout(() => {
    const m = msg.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    const d = wd.daily; const dns = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
    let r = "";
    
    if (m.includes('peli') || m.includes('casa') || m.includes('adentro') || m.includes('cama') || m.includes('arrunch')) {
      let maxR = -1, idx = 0; for(let i=0; i<7; i++) { if(d.precipitation_sum[i] > maxR) { maxR = d.precipitation_sum[i]; idx = i; } }
      const dN = idx === 0 ? 'Hoy' : idx === 1 ? 'Mañana' : dns[new Date(d.time[idx]).getDay()];
      r = maxR > 2 ? `¡El **${dN}** de cabeza! Va a caer alto aguacero (${Math.round(maxR)}mm), ideal para quedarse adentro comiendo pochoclos/palomitas sin culpa.` : `Como no hay tormentas a la vista, el día más fresco para quedarse aplastado en la cama es el **${dN}** con una mínima de ${Math.round(d.temperature_2m_min[idx])}°C.`;
    }
    else if (m.includes('cuentas') || m.includes('resumen') || m.includes('semana') || m.includes('mano')) {
      let rains = 0; for(let i=0; i<7; i++) { if(d.precipitation_sum[i] > 2) rains++; }
      r = rains >= 3 ? `Viene inestable la mano, bastante pasada por agua. Tené el paraguas cerca.` : `Viene una pinturita de semana, días mayormente estables para disfrutar afuera sin sorpresas raras.`;
    }
    else if (m.includes('correr') || m.includes('entrenar') || m.includes('bici')) {
      r = wd.current.precipitation > 0.5 ? "Ahora mismo está mojado afuera, te vas a patinar entero." : wd.current.temperature_2m > 30 ? "Hace demasiado calor ahora mismo, te va a dar una pálida si salís a correr. Esperá a que baje." : "Clima ideal para meterle patas a la calle, ¡salí ya!";
    }
    else if (m.includes('birra') || m.includes('cerveza') || m.includes('salir')) {
      r = wd.current.temperature_2m >= 24 ? "Está pintado para una buena birra bien fría al aire libre. Salida obligatoria." : "Hace fresquito para andar afuera, mejor busquen un lugar techado o armen plan en casa.";
    }

    if(!r) r = "Che/Mae, no te capté esa del todo, pero decime: ¿estás queriendo planear algo al aire libre o buscás el día más fresco/lluvioso?";
    addM(r, 'b');
  }, 400);
}

function sq(q){ document.getElementById('ci').value=q; sc(); }
function addM(t,cls){
  const div=document.getElementById('cm'); if(!div) return;
  const m=document.createElement('div'); m.className=`msg ${cls}`; m.innerHTML=t;
  div.appendChild(m); div.scrollTop=div.scrollHeight;
}

// ─── BUSCADOR ULTRA PREDICTIVO OPTIMIZADO PARA MÓVILES ───
document.getElementById('srch').addEventListener('input', function() {
  clearTimeout(acTimer);
  let q = this.value.trim();
  if(q.length < 2) { document.getElementById('ac').style.display = 'none'; return; }
  
  acTimer = setTimeout(async () => {
    try {
      // Limpiador agresivo de conectores comunes en búsquedas flojas en celulares
      let clean = q.toLowerCase().replace(/\s+costa\s+rica/g, ', Costa Rica').replace(/\s+argentina/g, ', Argentina').replace(/\s+mexico/g, ', México');
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(clean)}&format=json&addressdetails=1&limit=5&accept-language=es`;
      
      const r = await fetch(url, { headers: { 'Accept-Language': 'es' } });
      const data = await r.json();
      const ac = document.getElementById('ac');
      
      if(!data || data.length === 0) { ac.style.display = 'none'; return; }
      
      ac.innerHTML = data.map(item => {
        const name = item.address.city || item.address.town || item.address.village || item.address.hamlet || item.address.county || item.display_name.split(',')[0];
        const state = item.address.state ? item.address.state + ', ' : '';
        const country = item.address.country || '';
        
        return `<div class="ac-item" onclick="selCity(${item.lat}, ${item.lon}, '${name.replace(/'/g, "\\'")}', '${country.replace(/'/g, "\\'")}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" opacity=".4"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          <div>
            <div class="ac-city">${name}</div>
            <div class="ac-sub">${state}${country}</div>
          </div>
        </div>`;
      }).join('');
      ac.style.display = 'block';
    } catch(e) { console.error(e); }
  }, 300);
});

document.addEventListener('click', e => { if(!e.target.closest('.search-wrap')) document.getElementById('ac').style.display='none'; });

function selCity(lat, lon, name, country){
  document.getElementById('srch').value = name;
  document.getElementById('ac').style.display = 'none';
  fetchWeather(lat, lon, name, country);
}

// Geolocalización Automática Directa al entrar
function triggerAutoGeo() {
  if(!navigator.geolocation) return;
  document.getElementById('geoBtn').textContent = 'Ubicando...';
  
  navigator.geolocation.getCurrentPosition(async pos => {
    const {latitude:lat, longitude:lon} = pos.coords;
    try {
      const nr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`);
      const nd = await nr.json();
      const city = nd.address.city || nd.address.town || nd.address.village || 'Mi ubicación';
      document.getElementById('geoBtn').textContent = '📍 ' + city;
      document.getElementById('srch').value = city;
      fetchWeather(lat, lon, city, nd.address.country || '');
    } catch { fetchWeather(lat, lon, 'Mi ubicación', ''); }
  }, () => {
    document.getElementById('geoBtn').textContent = '📍 Usar mi ubi';
    document.getElementById('content').innerHTML = `
      <div class="welcome">
        <div class="welcome-sym">📍</div>
        <h2>¡Buenas, ${getDynamicGreeting()}!</h2>
        <p>No logramos leer tu ubicación de forma automática. Tocá el botón verde de arriba o usa el buscador para arrancar.</p>
      </div>
    `;
  }, { timeout: 6000 });
}

document.getElementById('geoBtn').onclick = triggerAutoGeo;

window.addEventListener('load', () => {
  // Disparo automático e inmediato en segundo plano
  triggerAutoGeo();
});
</script>
