<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima para Dummies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --card: rgba(255,255,255,0.1);
  --card-b: rgba(255,255,255,0.18);
  --blur: blur(20px);
  --r: 22px;
  --text: #fff;
  --soft: rgba(255,255,255,0.6);
  --accent: #E8FF57;
}

body {
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  background: #0f1b2d;
}

/* ─── MESH GRADIENT BG ─── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  transition: all 2s ease;
}
.bg-mesh {
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.9;
  transition: all 2s ease;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); transition: all 2s ease;
  pointer-events: none;
}

/* ─── PARTICLES ─── */
.particles {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none; overflow: hidden;
}
.raindrop {
  position: absolute; width: 1.5px;
  background: linear-gradient(180deg, transparent 0%, rgba(180,220,255,0.6) 100%);
  animation: rain linear infinite; opacity: 0;
}
@keyframes rain {
  0% { transform: translateY(-30px) skewX(-10deg); opacity:.5; }
  100% { transform: translateY(110vh) skewX(-10deg); opacity:0; }
}
.flake {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.8);
  animation: flakefall linear infinite; opacity: 0;
}
@keyframes flakefall {
  0% { transform: translateY(-10px) translateX(0); opacity:.7; }
  50% { transform: translateY(50vh) translateX(20px); }
  100% { transform: translateY(110vh) translateX(-10px); opacity:0; }
}

/* ─── APP ─── */
.app {
  position: relative; z-index: 10;
  max-width: 680px; margin: 0 auto;
  padding: 28px 20px 120px;
}

/* ─── HEADER ─── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
  animation: dn .5s ease both;
}
.logo {
  font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
.logo-badge {
  background: var(--accent); color: #0f1b2d;
  border-radius: 6px; padding: 2px 8px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase;
}
.geo-btn {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur);
  color: white; border-radius: 50px; padding: 8px 18px;
  font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  transition: all .2s; letter-spacing: 0.3px;
}
.geo-btn:hover { background: rgba(255,255,255,0.2); }
.geo-icon { width: 14px; height: 14px; }

/* ─── SEARCH BUSCADOR CORREGIDO ─── */
.search-wrap {
  position: relative; margin-bottom: 22px;
  animation: dn .5s .08s ease both; z-index: 2000;
}
.search-in {
  width: 100%;
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur);
  color: white; border-radius: 50px;
  padding: 14px 50px 14px 22px;
  font-size: .95rem; font-family: 'Syne', sans-serif; font-weight: 400;
  outline: none; transition: all .2s;
}
.search-in::placeholder { color: rgba(255,255,255,.4); }
.search-in:focus { border-color: rgba(255,255,255,.55); background: rgba(255,255,255,.16); }
.search-ico {
  position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
  opacity: .5;
}
.ac {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 2500;
  background: #0f1b2d; border: 1px solid var(--card-b); border-radius: 18px; 
  overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.6); max-height: 300px; overflow-y: auto;
}
.ac-item {
  padding: 14px 20px; cursor: pointer; font-size: .88rem;
  border-bottom: 1px solid rgba(255,255,255,.06);
  transition: background .15s;
  display: flex; align-items: center; gap: 12px;
}
.ac-item:last-child { border: none; }
.ac-item:hover { background: rgba(255,255,255,.1); }
.ac-city { font-weight: 600; color: #fff; }
.ac-sub { font-size: .72rem; opacity: .5; margin-top: 2px; }

/* ─── MAIN CARD ─── */
.main-card {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 26px 28px 22px;
  margin-bottom: 14px;
  animation: up .6s .15s ease both;
  position: relative; overflow: hidden;
}
.main-card::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 60%);
}
.loc-line {
  font-size: .78rem; font-weight: 500; opacity: .55;
  letter-spacing: .5px; text-transform: uppercase;
  margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
}
.city-h {
  font-size: 2.2rem; font-weight: 800; line-height: 1;
  letter-spacing: -1px; margin-bottom: 3px;
}
.date-h { font-size: .76rem; opacity: .45; letter-spacing: .3px; margin-bottom: 22px; }

.temp-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.big-t {
  font-size: 6rem; font-weight: 800;
  line-height: 1; letter-spacing: -5px;
}
.big-t sup { font-size: 2.2rem; vertical-align: top; margin-top: 14px; opacity: .6; letter-spacing: 0; }
.t-meta { text-align: right; padding-top: 6px; }
.feels-t { font-size: .8rem; opacity: .55; margin-bottom: 6px; }
.cond-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px; padding: 5px 14px; font-size: .8rem; font-weight: 600;
  letter-spacing: .2px;
}
.w-symbol {
  font-size: 3rem; line-height: 1;
  font-family: 'Syne Mono', monospace;
  opacity: .9;
}
.hi-lo { font-size: .75rem; opacity: .5; margin-top: 4px; letter-spacing: .3px; }

/* narrative */
.narrative {
  background: rgba(0,0,0,.2); border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0; padding: 14px 18px;
  font-size: .92rem; line-height: 1.65; font-weight: 400;
  font-style: italic; color: rgba(255,255,255,.88);
  margin-top: 14px;
}
.nar-loading {
  display: flex; align-items: center; gap: 6px;
  font-size: .8rem; opacity: .5; font-style: normal;
}
.dot { width: 5px; height: 5px; border-radius: 50%; background: white; animation: dotpop 1.2s infinite; }
.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }
@keyframes dotpop { 0%,80%,100%{opacity:.2;transform:scale(1)} 40%{opacity:1;transform:scale(1.3)} }

/* ─── STAT GRID ─── */
.stats-grid {
  display: grid; grid-template-columns: repeat(4,1fr);
  gap: 10px; margin-bottom: 14px;
  animation: up .6s .22s ease both;
}
@media(max-width:480px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
.stat {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); border-radius: 16px;
  padding: 14px 12px; text-align: center;
  transition: transform .2s;
}
.stat:hover { transform: translateY(-3px); }
.stat-sym {
  font-size: 1.5rem; line-height: 1; margin-bottom: 6px;
  font-family: 'Syne Mono', monospace;
}
.stat-val { font-size: 1.05rem; font-weight: 700; letter-spacing: -.3px; }
.stat-lbl { font-size: .65rem; opacity: .5; margin-top: 3px; letter-spacing: .5px; text-transform: uppercase; font-weight: 600; }

/* ─── HUMIDITY VISUAL ─── */
.humidity-card {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); border-radius: var(--r);
  padding: 20px 22px; margin-bottom: 14px;
  animation: up .6s .27s ease both;
  display: flex; align-items: center; gap: 20px;
}
.hum-circle {
  position: relative; width: 80px; height: 80px; flex-shrink: 0;
}
.hum-circle svg { width: 80px; height: 80px; transform: rotate(-90deg); }
.hum-circle .track { fill: none; stroke: rgba(255,255,255,.12); stroke-width: 6; }
.hum-circle .fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1.5s ease; }
.hum-num {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 1rem; font-weight: 800; letter-spacing: -.5px;
}
.hum-info { flex: 1; }
.hum-title { font-size: .7rem; opacity: .5; text-transform: uppercase; letter-spacing: .8px; font-weight: 600; margin-bottom: 6px; }
.hum-desc { font-size: .9rem; font-weight: 500; line-height: 1.4; }
.hum-bar-row { display: flex; gap: 3px; margin-top: 10px; }
.hum-seg {
  height: 4px; flex: 1; border-radius: 2px;
  background: rgba(255,255,255,.12); transition: background 1s ease;
}
.hum-seg.active { background: var(--hum-color, rgba(100,200,255,.7)); }

/* ─── SUN + MOON CARD ─── */
.sun-moon-card {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); border-radius: var(--r);
  padding: 20px 22px; margin-bottom: 14px;
  animation: up .6s .3s ease both;
}
.sm-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.sm-label { font-size: .7rem; opacity: .5; text-transform: uppercase; letter-spacing: .8px; font-weight: 600; }
.sm-row { display: grid; grid-template-columns: 1fr auto 1fr; gap: 12px; align-items: center; margin-bottom: 16px; }
.sm-time { text-align: center; }
.sm-time .time-val { font-size: 1.2rem; font-weight: 700; letter-spacing: -.5px; }
.sm-time .time-lbl { font-size: .68rem; opacity: .45; text-transform: uppercase; letter-spacing: .6px; margin-top: 2px; font-weight: 600; }
.sun-arc { position: relative; height: 40px; }
.sun-arc-track { position: absolute; top: 0; left: 0; right: 0; height: 40px; overflow: hidden; }
.sun-arc-track svg { width: 100%; height: 80px; }
.arc-path { fill: none; stroke: rgba(255,255,255,.15); stroke-width: 2; stroke-dasharray: 4 4; }
.arc-sun { fill: none; stroke: var(--accent); stroke-width: 2.5; stroke-linecap: round; }
.arc-dot { transition: all 1s ease; }

/* moon section */
.moon-section { border-top: 1px solid rgba(255,255,255,.08); padding-top: 14px; display: flex; align-items: center; gap: 16px; }
.moon-glyph { font-size: 2.2rem; line-height: 1; }
.moon-info .moon-phase { font-size: .95rem; font-weight: 700; }
.moon-info .moon-sub { font-size: .73rem; opacity: .45; margin-top: 3px; letter-spacing: .3px; }
.moon-rise-set { margin-left: auto; text-align: right; font-size: .75rem; opacity: .5; line-height: 1.6; }

/* ─── HOURLY ─── */
.hourly-scroll {
  display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px;
  scrollbar-width: none; margin-bottom: 14px;
  animation: up .6s .33s ease both;
}
.hourly-scroll::-webkit-scrollbar { display: none; }
.h-chip {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur);
  border-radius: 40px; padding: 11px 15px;
  text-align: center; min-width: 64px; flex-shrink: 0;
}
.h-chip.now { background: rgba(232,255,87,.18); border-color: rgba(232,255,87,.4); }
.h-t { font-size: .68rem; opacity: .5; margin-bottom: 5px; font-weight: 600; letter-spacing: .3px; }
.h-sym { font-size: 1rem; font-family: 'Syne Mono'; margin-bottom: 4px; }
.h-tmp { font-size: .85rem; font-weight: 700; }

/* ─── FORECAST ─── */
.forecast-row {
  display: flex; gap: 9px; overflow-x: auto;
  scrollbar-width: none; padding-bottom: 4px; margin-bottom: 14px;
  animation: up .6s .36s ease both;
}
.forecast-row::-webkit-scrollbar { display: none; }
.fc-day {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); border-radius: 16px;
  padding: 14px 12px; text-align: center; min-width: 80px; flex-shrink: 0;
  cursor: pointer; transition: all .2s;
}
.fc-day.active { background: rgba(232,255,87,.15); border-color: rgba(232,255,87,.5); }
.fc-day:hover { transform: translateY(-3px); }
.fc-name { font-size: .68rem; opacity: .5; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.fc-sym { font-size: 1.4rem; font-family: 'Syne Mono'; margin-bottom: 7px; }
.fc-max { font-size: 1rem; font-weight: 700; }
.fc-min { font-size: .72rem; opacity: .4; margin-top: 2px; }

/* ─── REC CARD ─── */
.rec-card {
  background: rgba(232,255,87,.08); border: 1px solid rgba(232,255,87,.25);
  backdrop-filter: var(--blur); border-radius: var(--r);
  padding: 18px 20px; margin-bottom: 14px;
  animation: up .6s .4s ease both;
}
.rec-hdr { font-size: .7rem; opacity: .6; letter-spacing: .8px; text-transform: uppercase; font-weight: 600; margin-bottom: 10px; }
.rec-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.rec-pill {
  background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.15);
  border-radius: 30px; padding: 6px 14px; font-size: .82rem; font-weight: 600;
}

/* ─── SECTION LABEL ─── */
.sec-lbl { font-size: .68rem; opacity: .4; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; }

/* ─── CHAT ─── */
.chat-wrap { animation: up .6s .44s ease both; }
.chat-msgs {
  max-height: 280px; overflow-y: auto; margin-bottom: 10px;
  display: flex; flex-direction: column; gap: 9px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,.1) transparent;
}
.msg {
  max-width: 84%; padding: 11px 16px; border-radius: 18px;
  font-size: .86rem; line-height: 1.55; animation: msgin .3s ease both;
}
@keyframes msgin { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
.msg.u {
  background: rgba(232,255,87,.15); border: 1px solid rgba(232,255,87,.3);
  align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 500;
}
.msg.b {
  background: rgba(0,0,0,.3); border: 1px solid rgba(255,255,255,.1);
  align-self: flex-start; border-bottom-left-radius: 4px; font-style: italic;
}
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; }
.chip {
  background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.15);
  border-radius: 20px; padding: 5px 12px; font-size: .73rem; cursor: pointer;
  font-family: 'Syne', sans-serif; font-weight: 500; transition: all .2s;
  letter-spacing: .2px;
}
.chip:hover { background: rgba(232,255,87,.15); border-color: rgba(232,255,87,.35); }
.chat-row { display: flex; gap: 9px; }
.chat-in {
  flex: 1; background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur); color: white; border-radius: 50px;
  padding: 12px 20px; font-family: 'Syne', sans-serif; font-size: .88rem; outline: none;
}
.chat-in::placeholder { color: rgba(255,255,255,.3); }
.chat-in:focus { border-color: rgba(232,255,87,.4); }
.send-btn {
  background: var(--accent); color: #0f1b2d;
  border: none; border-radius: 50%; width: 46px; height: 46px;
  font-size: 1rem; cursor: pointer; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all .2s; font-family: 'Syne', sans-serif; font-weight: 700;
}
.send-btn:hover { transform: scale(1.08); }

/* ─── WELCOME ─── */
.welcome {
  text-align: center; padding: 70px 20px;
  animation: up .7s ease both;
}
.welcome-sym { font-size: 4rem; font-family: 'Syne Mono'; margin-bottom: 20px; }
.welcome h2 { font-size: 1.9rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 10px; }
.welcome p { opacity: .5; font-size: .88rem; line-height: 1.7; max-width: 300px; margin: 0 auto; }

/* ─── ANIMS ─── */
@keyframes dn { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:none} }
@keyframes up { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="bg-mesh" id="mesh">
  <div class="orb" id="orb1" style="width:500px;height:500px;top:-150px;right:-100px;"></div>
  <div class="orb" id="orb2" style="width:400px;height:400px;bottom:-100px;left:-100px;"></div>
  <div class="orb" id="orb3" style="width:250px;height:250px;top:40%;left:40%;"></div>
</div>
<div class="particles" id="particles"></div>

<div class="app">
  <div class="header">
    <div class="logo">
      Clima
      <span class="logo-badge">para dummies</span>
    </div>
    <button class="geo-btn" id="geoBtn">
      <svg class="geo-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
      Mi ubicación
    </button>
  </div>

  <div class="search-wrap">
    <input class="search-in" id="srch" type="text" placeholder="Buscar ciudad (ej: Santa Teresa, Cóbano, San José)..." autocomplete="off">
    <span class="search-ico">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </span>
    <div class="ac" id="ac" style="display:none"></div>
  </div>

  <div id="content">
    <div class="welcome">
      <div class="welcome-sym">◈</div>
      <h2>Clima para Dummies</h2>
      <p>Sin tecnicismos. Sin confusión.<br>Solo lo que necesitás saber para salir de casa.</p>
    </div>
  </div>
</div>

<script>
const API = 'https://api.anthropic.com/v1/messages';
let wd = null, loc = null, acTimer = null;
let chatHist = [];

// Base local blindada para evitar retrasos en zonas conocidas
const LOCAL_PLACES = [
  { name: "Playa Santa Teresa", country: "Puntarenas, Costa Rica", lat: 9.6422, lon: -85.1682 },
  { name: "Cóbano", country: "Puntarenas, Costa Rica", lat: 9.6814, lon: -85.0974 },
  { name: "Liberia", country: "Guanacaste, Costa Rica", lat: 10.6350, lon: -85.4377 },
  { name: "San José", country: "Costa Rica", lat: 9.9281, lon: -84.0907 },
  { name: "Buenos Aires", country: "Argentina", lat: -34.6037, lon: -58.3816 },
  { name: "Mendoza", country: "Argentina", lat: -32.8895, lon: -68.8458 }
];

function wSym(code, day=true) {
  if (code===0) return day ? '☀' : '☽';
  if (code<=2) return day ? '⛅' : '☁';
  if (code===3) return '☁';
  if ([45,48].includes(code)) return '◎';
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return '⛆';
  if ([71,73,75,77,85,86].includes(code)) return '❄';
  if ([95,96,99].includes(code)) return '⚡';
  return '~';
}
function wText(code) {
  const m={0:'Despejado',1:'Casi despejado',2:'Algo nublado',3:'Nublado',45:'Niebla',48:'Niebla con escarcha',51:'Llovizna leve',53:'Llovizna',55:'Llovizna fuerte',61:'Lluvia leve',63:'Lluvia',65:'Lluvia fuerte',71:'Nieve leve',73:'Nieve',75:'Nieve fuerte',77:'Granizo',80:'Chaparrones',81:'Chaparrones mod.',82:'Chaparrones fuertes',85:'Nevadas',86:'Nevadas fuertes',95:'Tormenta',96:'Tormenta con granizo',99:'Tormenta severa'};
  return m[code]||'Variable';
}

function moonPhase(date) {
  const phases = [
    {name:'Luna Nueva',glyph:'●',days:[0,1]},
    {name:'Creciente',glyph:'◐',days:[2,6]},
    {name:'Cuarto Creciente',glyph:'◑',days:[7,8]},
    {name:'Gibosa Creciente',glyph:'◕',days:[9,13]},
    {name:'Luna Llena',glyph:'○',days:[14,15]},
    {name:'Gibosa Menguante',glyph:'◔',days:[16,20]},
    {name:'Cuarto Menguante',glyph:'◒',days:[21,22]},
    {name:'Menguante',glyph:'◓',days:[23,28]},
  ];
  const synodic = 29.53;
  const known = new Date('2000-01-06');
  const diff = (date - known) / (1000*60*60*24);
  const cycle = ((diff % synodic) + synodic) % synodic;
  const day = Math.floor(cycle);
  for (const p of phases) {
    if (day >= p.days[0] && day <= p.days[1]) return {...p, cycle: cycle/synodic};
  }
  return phases[0];
}

function humDesc(h) {
  if (h < 30) return { text: 'Ambiente muy seco. Si tenés piel sensible, cuidado.', color: 'rgba(255,180,100,.7)' };
  if (h < 50) return { text: 'Humedad ideal. El aire se siente cómodo y fresco.', color: 'rgba(100,220,150,.7)' };
  if (h < 70) return { text: 'Algo húmedo. La sensación térmica sube un poco.', color: 'rgba(100,180,255,.7)' };
  if (h < 85) return { text: 'Bastante húmedo. Vas a sudar más de lo normal.', color: 'rgba(100,140,255,.7)' };
  return { text: 'Humedad muy alta. El calor se siente mucho más agobiante.', color: 'rgba(180,100,255,.7)' };
}

const THEMES = {
  sunny:  { bg:'#0a1628', o1:'rgba(255,200,50,.35)', o2:'rgba(50,120,255,.2)', o3:'rgba(255,150,0,.15)', px:'none' },
  cloudy: { bg:'#141e2e', o1:'rgba(100,130,160,.3)', o2:'rgba(60,80,110,.25)', o3:'rgba(80,100,130,.15)', px:'none' },
  rainy:  { bg:'#0d1628', o1:'rgba(40,80,200,.35)', o2:'rgba(20,50,150,.3)', o3:'rgba(60,100,220,.15)', px:'rain' },
  stormy: { bg:'#0a0e18', o1:'rgba(80,0,160,.3)', o2:'rgba(20,30,80,.4)', o3:'rgba(150,50,255,.1)', px:'rain' },
  snowy:  { bg:'#121c2c', o1:'rgba(180,210,255,.25)', o2:'rgba(100,140,200,.2)', o3:'rgba(200,220,255,.1)', px:'snow' },
  foggy:  { bg:'#131c2a', o1:'rgba(120,140,160,.25)', o2:'rgba(80,100,130,.2)', o3:'rgba(100,120,150,.1)', px:'none' },

};

function getThemeKey(code, day) {
  if (!day) return 'night';
  if ([95,96,99].includes(code)) return 'stormy';
  if ([61,63,65,80,81,82].includes(code)) return 'rainy';
  if ([71,73,75,77,85,86].includes(code)) return 'snowy';
  if ([45,48].includes(code)) return 'foggy';
  if ([1,2,3].includes(code)) return 'cloudy';
  return 'sunny';
}

function applyTheme(code, day) {
  const k = getThemeKey(code, day);
  const t = THEMES[k];
  document.getElementById('bg').style.background = t.bg;
  document.getElementById('orb1').style.background = `radial-gradient(circle, ${t.o1} 0%, transparent 70%)`;
  document.getElementById('orb2').style.background = `radial-gradient(circle, ${t.o2} 0%, transparent 70%)`;
  document.getElementById('orb3').style.background = `radial-gradient(circle, ${t.o3} 0%, transparent 70%)`;
  setupPx(t.px);
}

function setupPx(type) {
  const p = document.getElementById('particles');
  p.querySelectorAll('.raindrop,.flake').forEach(e=>e.remove());
  if (type==='rain') {
    for(let i=0;i<50;i++){
      const d=document.createElement('div'); d.className='raindrop';
      d.style.cssText=`left:${Math.random()*100}vw;height:${15+Math.random()*20}px;animation-duration:${.4+Math.random()*.4}s;animation-delay:${Math.random()*2}s`;
      p.appendChild(d);
    }
  } else if (type==='snow') {
    for(let i=0;i<30;i++){
      const s=document.createElement('div'); s.className='flake';
      const sz=2+Math.random()*4;
      s.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
      p.appendChild(s);
    }
  }
}

async function fetchWeather(lat, lon, name, country) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,precipitation,weather_code,is_day,uv_index&hourly=temperature_2m,weather_code,precipitation_probability&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,uv_index_max,wind_speed_10m_max&timezone=auto&forecast_days=7`;
  const r = await fetch(url); wd = await r.json();
  loc = {name, country, lat, lon};
  chatHist = [];
  render();
}

      </div>

function getRecs(c, d) {
  const items=[], t=c.temperature_2m, rain=d.precipitation_sum[0], wind=c.wind_speed_10m, uv=d.uv_index_max[0], hum=c.relative_humidity_2m;
  if(t<5){items.push('Abrigo pesado');items.push('Guantes y bufanda');}
  else if(t<12){items.push('Campera abrigada');}
  else if(t<18){items.push('Campera liviana');}
  else if(t<24){items.push('Ropa de media estación');}
  else{items.push('Ropa fresca y liviana');}
  if(rain>2) items.push('Paraguas o piloto');
  if(wind>35) items.push('Cuidado con el viento');
  if(uv>=6) items.push('Protector solar sí o sí');
  else if(uv>=3) items.push('Algo de protector solar');
  if(t>30) items.push('Mucha agua');
  if(hum>80&&t>25) items.push('Ropa transpirable');
  return items.map(i=>`<span class="rec-pill">${i}</span>`).join('');
}

async function genNar() {
  if(!wd) return;
  const c=wd.current, d=wd.daily;
  const ctx=`Ciudad: ${loc.name}. Temp: ${Math.round(c.temperature_2m)}°C (sensación ${Math.round(c.apparent_temperature)}°C). Condición: ${wText(c.weather_code)}. Humedad: ${c.relative_humidity_2m}%. Viento: ${Math.round(c.wind_speed_10m)} km/h. Lluvia hoy: ${d.precipitation_sum[0]}mm. UV: ${d.uv_index_max[0]}. Máx: ${Math.round(d.temperature_2m_max[0])}° Mín: ${Math.round(d.temperature_2m_min[0])}°.`;
  try {
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:`Sos un amigo que explica el clima de forma copada y natural. En 2-3 oraciones contá cómo va a estar el día y por qué: si va a estar lindo, feo, húmedo, frío, tormentoso, etc. Mencioná algo sobre la sensación real, no solo la temperatura. Sin tecnicismos. Sin saludos. Directo al punto. Responde en español rioplatense.`,
      messages:[{role:'user',content:`Describí el clima: ${ctx}`}]
    })});
    const data=await r.json();
    document.getElementById('nar').textContent = data.content?.[0]?.text || fallbackNar(c,d);
  } catch { document.getElementById('nar').textContent = fallbackNar(c,d); }
}

function fallbackNar(c,d) {
  const t=c.temperature_2m, code=c.weather_code;
  if(code===0&&t>25) return 'Día de sol de los buenos. Cielo completamente despejado y temperatura bien agradable para disfrutar afuera.';
  if(code===0) return 'Cielo limpio y despejado. Un día tranquilo, sin sorpresas del tiempo.';
  if(code<=2) return 'Mayormente soleado con algunas nubes que pasan de largo. Bastante agradable para estar afuera.';
  if([61,63,65,80,81,82].includes(code)) return 'Lluvia en el ambiente. Salí con paraguas y si podés, ropa impermeable. El piso va a estar mojado.';
  if([95,96,99].includes(code)) return 'Tormenta en camino o en curso. Mejor quedarte bajo techo hasta que pase.';
  return 'El tiempo está algo variable hoy. No te alejés mucho sin mirar el cielo antes.';
}

async function sc() {
  const inp=document.getElementById('ci'), msg=inp.value.trim();
  if(!msg||!wd) return;
  inp.value='';
  addM(msg,'u'); addM('…','b',true);
  chatHist.push({role:'user',content:msg});
  const ctx=`${loc.name}: ${wText(wd.current.weather_code)}, ${Math.round(wd.current.temperature_2m)}°C, humedad ${wd.current.relative_humidity_2m}%, viento ${Math.round(wd.current.wind_speed_10m)}km/h. Mañana: ${wText(wd.daily.weather_code[1])}, máx ${Math.round(wd.daily.temperature_2m_max[1])}°. Pasado: ${wText(wd.daily.weather_code[2])}, máx ${Math.round(wd.daily.temperature_2m_max[2])}°.`;
  try {
    const r=await fetch(API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({
      model:'claude-sonnet-4-20250514',max_tokens:1000,
      system:`Sos un asistente de clima simpático. Respondés preguntas de forma conversacional y copada, como un amigo. Máximo 2-3 oraciones. Español rioplatense. Contexto: ${ctx}`,
      messages:chatHist
    })});
    const data=await r.json();
    const reply=data.content?.[0]?.text||'No pude procesar eso, reintentá.';
    chatHist.push({role:'assistant',content:reply});
    rmTyping(); addM(reply,'b');
  } catch { rmTyping(); addM('No me pude conectar ahora. Intentá de nuevo.','b'); }
}

// ─── AUTOCOMPLETE CORREGIDO Y SEGURO ───
document.getElementById('srch').addEventListener('input', function(){
  clearTimeout(acTimer);
  const q = this.value.trim().toLowerCase();
  const ac = document.getElementById('ac');
  if (q.length < 2) { ac.style.display = 'none'; return; }

  acTimer = setTimeout(async () => {
    // 1. Filtrado inmediato sobre ubicaciones clave para que responda siempre instantáneamente
    let matches = LOCAL_PLACES.filter(p => p.name.toLowerCase().includes(q) || p.country.toLowerCase().includes(q));
    
    try {
      // 2. Traer resultados globales complementarios del motor de geocodificación
      const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=5&language=es`);
      const d = await r.json();
      const res = d.results || [];
      
      res.forEach(item => {
        if (item.name && !matches.some(m => m.name.toLowerCase() === item.name.toLowerCase())) {
          matches.push({
            name: item.name,
            country: `${item.admin1 ? item.admin1 + ', ' : ''}${item.country || ''}`,
            lat: item.latitude,
            lon: item.longitude
          });
        }
      });
    } catch (err) {
      console.log("Fallo de red menor, usando base local segura.");
    }

    // Renderizado seguro sin romper capas HTML ni estilos
    if (!matches.length) {
      ac.innerHTML = `<div class="ac-item" style="cursor:default; opacity:0.5; color:#fff;">❌ No se encontraron resultados</div>`;
    } else {
      ac.innerHTML = matches.map(r => `
        <div class="ac-item" onclick="selCity(${r.lat}, ${r.lon}, '${r.name.replace(/'/g, "\\'")}', '${r.country.replace(/'/g, "\\'")}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" opacity=".4" style="color:#fff;"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          <div>
            <div class="ac-city">${r.name}</div>
            <div class="ac-sub">${r.country}</div>
          </div>
        </div>
      `).join('');
    }
    ac.style.display = 'block';
  }, 250);
});
