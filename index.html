<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Clima para Dummies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --card: rgba(255,255,255,0.07);
  --card-b: rgba(255,255,255,0.15);
  --blur: blur(20px);
  --r: 24px;
  --text: #fff;
  --accent: #E8FF57;
  --bg-dark: #090f1a;
}

body {
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  background: var(--bg-dark);
}

.bg { position: fixed; inset: 0; z-index: 0; background: var(--bg-dark); transition: all 1.5s ease; }
.bg-mesh { position: fixed; inset: 0; z-index: 0; opacity: 0.8; pointer-events: none; }
.orb { position: absolute; border-radius: 50%; filter: blur(80px); transition: all 1.5s ease; }

.app { position: relative; z-index: 10; max-width: 600px; margin: 0 auto; padding: 16px 14px 60px; display: flex; flex-direction: column; gap: 14px; }

.header { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
.logo { font-size: 1.2rem; font-weight: 800; }
.logo-badge { background: var(--accent); color: #0f1b2d; border-radius: 6px; padding: 2px 6px; font-size: 0.65rem; font-weight: 800; text-transform: uppercase; }

.geo-btn {
  background: var(--accent); color: #0f1b2d; border: none;
  border-radius: 50px; padding: 8px 14px; font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; gap: 4px; transition: all .2s; white-space: nowrap;
}

.search-wrap { position: relative; z-index: 200; }
.search-in {
  width: 100%; background: var(--card); border: 1px solid var(--card-b); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  color: white; border-radius: 50px; padding: 14px 44px 14px 18px; font-size: 0.95rem; font-family: 'Syne', sans-serif; outline: none;
}
.search-in:focus { border-color: rgba(255,255,255,.4); background: rgba(255,255,255,.1); }

.ac {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: #0c1424; border: 1px solid rgba(255,255,255,0.15); border-radius: 16px; overflow: hidden; box-shadow: 0 12px 30px rgba(0,0,0,0.5); max-height: 250px; overflow-y: auto;
}
.ac-item { padding: 12px 16px; cursor: pointer; font-size: .9rem; border-bottom: 1px solid rgba(255,255,255,.05); display: flex; align-items: center; gap: 10px; }
.ac-item:hover { background: rgba(255,255,255,.08); }
.ac-city { font-weight: 700; color: #fff; }
.ac-sub { font-size: .75rem; opacity: .5; }

.hero-narrative-card {
  background: linear-gradient(135deg, rgba(232,255,87,0.08) 0%, rgba(255,255,255,0.02) 100%);
  border: 2px solid rgba(232,255,87,0.2); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 24px 20px;
}
.hero-loc { font-size: .75rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
.hero-text { font-size: 1.2rem; font-weight: 600; line-height: 1.4; color: #fff; }

.mini-weather-row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; padding-top: 14px; border-top: 1px solid rgba(255,255,255,0.08); }
.mini-temp { font-size: 2.8rem; font-weight: 800; letter-spacing: -1px; }
.mini-temp sup { font-size: 1.1rem; }
.mini-meta { text-align: right; }
.mini-cond { font-weight: 700; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 50px; font-size: .78rem; display: inline-block; }

.stats-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
.stat { background: var(--card); border: 1px solid var(--card-b); border-radius: 14px; padding: 12px 8px; text-align: center; }
.stat-val { font-size: 1rem; font-weight: 700; }
.stat-lbl { font-size: .62rem; opacity: .5; text-transform: uppercase; }

/* SECCIÓN CHAT IA */
.ia-card {
  background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255,255,255,0.1);
  border-radius: var(--r); padding: 16px; display: flex; flex-direction: column; gap: 12px;
}
.ia-title { font-size: 0.8rem; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }
.ia-box { 
  background: rgba(0,0,0,0.2); border-radius: 12px; padding: 12px; font-size: 0.9rem; line-height: 1.4; 
  min-height: 50px; color: rgba(255,255,255,0.9);
}
.ia-form { display: flex; gap: 8px; }
.ia-in {
  flex: 1; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50px; padding: 10px 16px; color: white; font-family: 'Syne'; font-size: 0.85rem; outline: none;
}
.ia-btn {
  background: white; color: #090f1a; border: none; border-radius: 50px; padding: 0 16px;
  font-family: 'Syne'; font-weight: 700; font-size: 0.85rem; cursor: pointer;
}

.welcome { text-align: center; padding: 40px 14px; }
.welcome h2 { font-size: 1.6rem; font-weight: 800; }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="bg-mesh">
  <div class="orb" id="orb1" style="width:300px;height:300px;top:-100px;right:-50px;background:radial-gradient(circle, rgba(255,200,50,.15) 0%, transparent 70%);"></div>
</div>

<div class="app">
  <div class="header">
    <div class="logo">Clima <span class="logo-badge">Dummies</span></div>
    <button class="geo-btn" id="geoBtn">📍 Mi ubicación</button>
  </div>

  <div class="search-wrap">
    <input class="search-in" id="srch" type="text" placeholder="Buscá cualquier lugar (ej: Santa Teresa)..." autocomplete="off">
    <div class="ac" id="ac" style="display:none"></div>
  </div>

  <div id="content">
    <div class="welcome">
      <h2>Clima para Dummies</h2>
      <p style="opacity:0.6; font-size:0.9rem; margin-top:8px;">Cargando interfaz...</p>
    </div>
  </div>

  <!-- CASILLA DE LA IA EN ESPAÑOL -->
  <div class="ia-card">
    <div class="ia-title">🤖 Preguntale a la IA sobre el clima</div>
    <div class="ia-box" id="iaResponse">¡Hola! Soy tu asistente de clima inteligente. Escribime lo que quieras saber sobre el lugar seleccionado o pedime consejos sobre qué ropa usar hoy.</div>
    <div class="ia-form">
      <input class="ia-in" id="iaInput" type="text" placeholder="¿Va a llover el fin de semana? / ¿Qué ropa llevo?">
      <button class="ia-btn" onclick="askIA()">Enviar</button>
    </div>
  </div>
</div>

<script>
let wd = null, loc = null, acTimer = null;

function wText(code) {
  const m={0:'Despejado',1:'Casi despejado',2:'Algo nublado',3:'Nublado',45:'Niebla',51:'Llovizna',61:'Lluvia leve',63:'Lluvia',65:'Lluvia fuerte',95:'Tormenta eléctrica'};
  return m[code]||'Variable';
}

// ─── GENERADOR DE FRASES 100% FIEL A LA TEMPERATURA ACTUAL ───
function getFittedNarrative(name, country, temp, code) {
  const isRain = [51, 61, 63, 65, 95].includes(code);
  const place = name;

  if (isRain) {
    return `¡Cuidado en ${place}! Se vino el agua con ganas. El cielo se descosió por completo, así que ni te estreses saliendo sin paraguas o piloto. Clásico día para quedarse adentro tomando algo calientito.`;
  }
  
  if (temp >= 30) {
    return `¡Qué horno total en ${place}! Registrando unos pesados ${Math.round(temp)}°C. Es un calorón pesado, ideal para buscar una sombra, mandarse un agua de pipa o un tereré congelado y prender el ventilador a máxima potencia.`;
  }
  
  if (temp >= 23) {
    return `Qué clima más sabroso hay en ${place}. Con unos ${Math.round(temp)}°C bien puestos, está perfecto para andar en shorts, ropa ligera y disfrutar del día libre afuera al sol.`;
  }
  
  if (temp <= 14) {
    return `¡Qué frío más bravo en ${place}! Con apenas ${Math.round(temp)}°C el viento te va a congelar las ideas. Ponete una buena campera o abrigo porque la temperatura no está para andar jugando al valiente.`;
  }
  
  return `Día bastante equilibrado en ${place}. Unos ${Math.round(temp)}°C que ni queman ni congelan. Te ponés un bucito liviano encima y estás más que listo para salir a hacer los mandados.`;
}

async function fetchWeather(lat, lon, name, country) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,is_day,relative_humidity_2m,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&timezone=auto&forecast_days=1`;
  try {
    const r = await fetch(url);
    wd = await r.json();
    loc = {lat, lon, name, country};
    render();
  } catch (err) {
    alert("Error al obtener datos meteorológicos.");
  }
}

function render() {
  const c = wd.current;
  const d = wd.daily;
  const funnyText = getFittedNarrative(loc.name, loc.country, c.temperature_2m, c.weather_code);

  document.getElementById('content').innerHTML = `
    <div class="hero-narrative-card">
      <div class="hero-loc">📍 ${loc.name} ${loc.country ? ', ' + loc.country : ''}</div>
      <div class="hero-text">${funnyText}</div>
      
      <div class="mini-weather-row">
        <div class="mini-temp">${Math.round(c.temperature_2m)}<sup>°C</sup></div>
        <div class="mini-meta">
          <div class="mini-cond">${wText(c.weather_code)}</div>
          <div style="font-size:0.75rem; opacity:0.5; margin-top:4px;">Mín: ${Math.round(d.temperature_2m_min[0])}° | Máx: ${Math.round(d.temperature_2m_max[0])}°</div>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat"><div class="stat-val">${Math.round(c.wind_speed_10m)} km/h</div><div class="stat-lbl">Viento</div></div>
      <div class="stat"><div class="stat-val">${Math.round(c.relative_humidity_2m)}%</div><div class="stat-lbl">Humedad</div></div>
    </div>
  `;
}

// ─── BUSCADOR TRADICIONAL ABIERTO (Muestra todas las provincias y pueblos normales) ───
document.getElementById('srch').addEventListener('input', function() {
  clearTimeout(acTimer);
  let q = this.value.trim();
  const ac = document.getElementById('ac');
  if(q.length < 2) { ac.style.display = 'none'; return; }
  
  acTimer = setTimeout(async () => {
    try {
      // Motor oficial directo Open-Meteo Geocoding sin filtros forzados
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=6&language=es&format=json`;
      const response = await fetch(url);
      const data = await response.json();
      
      if(!data.results || data.results.length === 0) { ac.style.display = 'none'; return; }
      
      ac.innerHTML = data.results.map(item => {
        const name = item.name;
        const country = item.country || '';
        // Muestra el estado, provincia o región administrativa para que el usuario se guíe bien
        const admin1 = item.admin1 ? item.admin1 + ', ' : ''; 
        
        return `<div class="ac-item" onclick="selCity(${item.latitude}, ${item.longitude}, '${name.replace(/'/g, "\\'")}', '${country.replace(/'/g, "\\'")}')">
          <span style="font-size:1.1rem;">📍</span>
          <div>
            <div class="ac-city">${name}</div>
            <div class="ac-sub">${admin1}${country}</div>
          </div>
        </div>`;
      }).join('');
      ac.style.display = 'block';
    } catch(e) {
      ac.style.display = 'none';
    }
  }, 300); 
});

document.addEventListener('click', e => { if(!e.target.closest('.search-wrap')) document.getElementById('ac').style.display='none'; });

function selCity(lat, lon, name, country){
  document.getElementById('srch').value = name;
  document.getElementById('ac').style.display = 'none';
  fetchWeather(lat, lon, name, country);
}

// ─── LÓGICA DE SIMULACIÓN DE RESPUESTAS DE LA IA LOCAL ───
function askIA() {
  const prompt = document.getElementById('iaInput').value.trim();
  const responseBox = document.getElementById('iaResponse');
  if(!prompt) return;

  if(!loc || !wd) {
    responseBox.textContent = "Primero selecciona una ubicación usando el buscador para poder darte consejos inteligentes.";
    return;
  }

  responseBox.textContent = "🤖 Pensando respuesta...";
  
  setTimeout(() => {
    const temp = Math.round(wd.current.temperature_2m);
    const cond = wText(wd.current.weather_code).toLowerCase();
    
    // Respuestas lógicas basadas en los datos reales cargados en pantalla
    if(prompt.toLowerCase().includes('ropa') || prompt.toLowerCase().includes('llevar') || prompt.toLowerCase().includes('vestir')) {
      if(temp >= 26) {
        responseBox.textContent = `🤖 Analizando ${loc.name}: Con ${temp}°C y cielo ${cond}, te recomiendo usar ropa fresca, shorts, camiseta de algodón y lentes de sol. No necesitas abrigos para nada hoy.`;
      } else if(temp <= 15) {
        responseBox.textContent = `🤖 Analizando ${loc.name}: Está haciendo bastante frío (${temp}°C). Es obligatorio llevar abrigo pesado o una buena campera rompevientos si vas a salir.`;
      } else {
        responseBox.textContent = `🤖 Analizando ${loc.name}: El clima está templado (${temp}°C). Una camiseta normal y un abrigo ligero por si refresca más tarde es la combinación ideal.`;
      }
    } else if(prompt.toLowerCase().includes('lluvia') || prompt.toLowerCase().includes('llover') || prompt.toLowerCase().includes('agua')) {
      if([51,61,63,65,95].includes(wd.current.weather_code)) {
        responseBox.textContent = `🤖 Revisión climática: Sí, actualmente se registran condiciones de ${cond}. Mejor lleva paraguas o quédate bajo techo.`;
      } else {
        responseBox.textContent = `🤖 Revisión climática: Por el momento no se registran lluvias fuertes programadas para las próximas horas en ${loc.name}, está reportado como ${cond}.`;
      }
    } else {
      responseBox.textContent = `🤖 Con respecto a tu pregunta sobre "${prompt}" en ${loc.name}: Te confirmo que actualmente hay ${temp}°C con un estado ${cond}. Es un buen momento para disfrutar del día tomando las previsiones normales de la zona.`;
    }
    document.getElementById('iaInput').value = '';
  }, 800);
}

function triggerAutoGeo() {
  if(!navigator.geolocation) { fetchWeather(9.9281, -84.0907, 'San José', 'Costa Rica'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    fetchWeather(pos.coords.latitude, pos.coords.longitude, 'Mi ubicación', '');
  }, () => {
    // Si no da permisos de GPS, por defecto cargamos San José de Costa Rica de forma limpia
    fetchWeather(9.9281, -84.0907, 'San José', 'Costa Rica');
  });
}

window.addEventListener('load', triggerAutoGeo);
document.getElementById('geoBtn').onclick = triggerAutoGeo;
</script>
</body>
</html>
