<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima para Dummies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --card: rgba(255,255,255,0.1);
  --card-b: rgba(255,255,255,0.18);
  --blur: blur(20px);
  --r: 22px;
  --text: #fff;
  --soft: rgba(255,255,255,0.6);
  --accent: #E8FF57;
}

body {
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  background: #0f1b2d;
}

/* ─── MESH GRADIENT BG ─── */
.bg {
  position: fixed; inset: 0; z-index: 0;
  transition: all 2s ease;
}
.bg-mesh {
  position: fixed; inset: 0; z-index: 0;
  opacity: 0.9;
  transition: all 2s ease;
}
.orb {
  position: absolute; border-radius: 50%;
  filter: blur(80px); transition: all 2s ease;
  pointer-events: none;
}

/* ─── PARTICLES ─── */
.particles {
  position: fixed; inset: 0; z-index: 1;
  pointer-events: none; overflow: hidden;
}
.raindrop {
  position: absolute; width: 1.5px;
  background: linear-gradient(180deg, transparent 0%, rgba(180,220,255,0.6) 100%);
  animation: rain linear infinite; opacity: 0;
}
@keyframes rain {
  0% { transform: translateY(-30px) skewX(-10deg); opacity:.5; }
  100% { transform: translateY(110vh) skewX(-10deg); opacity:0; }
}
.flake {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.8);
  animation: flakefall linear infinite; opacity: 0;
}
@keyframes flakefall {
  0% { transform: translateY(-10px) translateX(0); opacity:.7; }
  50% { transform: translateY(50vh) translateX(20px); }
  100% { transform: translateY(110vh) translateX(-10px); opacity:0; }
}

/* ─── APP ─── */
.app {
  position: relative; z-index: 10;
  max-width: 680px; margin: 0 auto;
  padding: 28px 20px 120px;
}

/* ─── HEADER ─── */
.header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
  animation: dn .5s ease both;
}
.logo {
  font-size: 1.25rem; font-weight: 800; letter-spacing: -0.5px;
  display: flex; align-items: center; gap: 8px;
}
.logo-badge {
  background: var(--accent); color: #0f1b2d;
  border-radius: 6px; padding: 2px 8px;
  font-size: 0.7rem; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase;
}
.geo-btn {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur);
  color: white; border-radius: 50px; padding: 8px 18px;
  font-family: 'Syne', sans-serif; font-size: 0.78rem; font-weight: 500;
  cursor: pointer; display: flex; align-items: center; gap: 7px;
  transition: all .2s; letter-spacing: 0.3px;
}
.geo-btn:hover { background: rgba(255,255,255,0.2); }
.geo-icon { width: 14px; height: 14px; }

/* ─── SEARCH BUSCADOR CORREGIDO ─── */
.search-wrap {
  position: relative; margin-bottom: 22px;
  animation: dn .5s .08s ease both; z-index: 2000;
}
.search-in {
  width: 100%;
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur);
  color: white; border-radius: 50px;
  padding: 14px 50px 14px 22px;
  font-size: .95rem; font-family: 'Syne', sans-serif; font-weight: 400;
  outline: none; transition: all .2s;
}
.search-in::placeholder { color: rgba(255,255,255,.4); }
.search-in:focus { border-color: rgba(255,255,255,.55); background: rgba(255,255,255,.16); }
.search-ico {
  position: absolute; right: 18px; top: 50%; transform: translateY(-50%);
  opacity: .5;
}
.ac {
  position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 2500;
  background: #0f1b2d; border: 1px solid var(--card-b); border-radius: 18px; 
  overflow: hidden; box-shadow: 0 12px 40px rgba(0,0,0,.6); max-height: 300px; overflow-y: auto;
}
.ac-item {
  padding: 14px 20px; cursor: pointer; font-size: .88rem;
  border-bottom: 1px solid rgba(255,255,255,.06);
  transition: background .15s;
  display: flex; align-items: center; gap: 12px;
}
.ac-item:last-child { border: none; }
.ac-item:hover { background: rgba(255,255,255,.1); }
.ac-city { font-weight: 600; color: #fff; }
.ac-sub { font-size: .72rem; opacity: .5; margin-top: 2px; }

/* ─── MAIN CARD ─── */
.main-card {
  background: var(--card); border: 1px solid var(--card-b);
  backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 26px 28px 22px;
  margin-bottom: 14px;
  animation: up .6s .15s ease both;
  position: relative; overflow: hidden;
}
.main-card::before {
  content: ''; position: absolute; inset: 0; z-index: -1;
  background: linear-gradient(135deg, rgba(255,255,255,.08) 0%, transparent 60%);
}
.loc-line {
  font-size: .78rem; font-weight: 500; opacity: .55;
  letter-spacing: .5px; text-transform: uppercase;
  margin-bottom: 4px; display: flex; align-items: center; gap: 6px;
}
.city-h {
  font-size: 2.2rem; font-weight: 800; line-height: 1;
  letter-spacing: -1px; margin-bottom: 3px;
}
.date-h { font-size: .76rem; opacity: .45; letter-spacing: .3px; margin-bottom: 22px; }

.temp-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 18px; }
.big-t {
  font-size: 6rem; font-weight: 800;
  line-height: 1; letter-spacing: -5px;
}
.big-t sup { font-size: 2.2rem; vertical-align: top; margin-top: 14px; opacity: .6; letter-spacing: 0; }
.t-meta { text-align: right; padding-top: 6px; }
.feels-t { font-size: .8rem; opacity: .55; margin-bottom: 6px; }
.cond-pill {
  display: inline-flex; align-items: center; gap: 8px;
  background: rgba(255,255,255,.15); border: 1px solid rgba(255,255,255,.2);
  border-radius: 20px; padding: 5px 14px; font-size: .8rem; font-weight: 600;
  letter-spacing: .2px;
}
.w-symbol {
  font-size: 3rem; line-height: 1;
  font-family: 'Syne Mono', monospace;
  opacity: .9;
}
.hi-lo { font-size: .75rem; opacity: .5; margin-top: 4px; letter-spacing: .3px; }

/* narrative */
.narrative {
  background: rgba(0,0,0,.2); border-left: 3px solid var(--accent);
  border-radius: 0 12px 12px 0; padding: 14px 18px;
  font-size: .92rem; line-height: 1.65; font-weight: 400;
  font-style: italic; color: rgba(255,255,255,.88);
  margin-top: 14px;
}
.nar-loading {
  display: flex; align-items: center; gap: 6px;
  font-size: .8rem; opacity: .5; font-style: normal;
}
.dot { width: 5px; height: 5px; border-radius: 50%; background: white; animation: dotpop 1.2s infinite; }
.dot:nth-child(2){ animation-delay:.2s; }
.dot:nth-child(3){ animation-delay:.4s; }
