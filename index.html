<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima para Dummies</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }

:root {
  --card: rgba(255,255,255,0.07);
  --card-b: rgba(255,255,255,0.15);
  --blur: blur(24px);
  --r: 24px;
  --text: #fff;
  --soft: rgba(255,255,255,0.6);
  --accent: #E8FF57;
  --bg-dark: #090f1a;
}

body {
  font-family: 'Syne', sans-serif;
  min-height: 100vh;
  color: var(--text);
  overflow-x: hidden;
  background: var(--bg-dark);
}

/* ─── BACKGROUND MESH & PARTICLES ─── */
.bg { position: fixed; inset: 0; z-index: 0; background: var(--bg-dark); transition: all 2s ease; }
.bg-mesh { position: fixed; inset: 0; z-index: 0; opacity: 0.85; transition: all 2s ease; }
.orb { position: absolute; border-radius: 50%; filter: blur(90px); transition: all 2s ease; pointer-events: none; }
.particles { position: fixed; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.raindrop {
  position: absolute; width: 1.5px;
  background: linear-gradient(180deg, transparent 0%, rgba(180,220,255,0.5) 100%);
  animation: rain linear infinite; opacity: 0;
}
@keyframes rain {
  0% { transform: translateY(-30px) skewX(-10deg); opacity:.5; }
  100% { transform: translateY(110vh) skewX(-10deg); opacity:0; }
}
.flake {
  position: absolute; border-radius: 50%; background: rgba(255,255,255,0.8);
  animation: flakefall linear infinite; opacity: 0;
}
@keyframes flakefall {
  0% { transform: translateY(-10px) translateX(0); opacity:.7; }
  50% { transform: translateY(50vh) translateX(20px); }
  100% { transform: translateY(110vh) translateX(-10px); opacity:0; }
}

/* ─── APP STRUCTURE ─── */
.app { position: relative; z-index: 10; max-width: 680px; margin: 0 auto; padding: 30px 20px 100px; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; gap: 12px; }
.logo { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; }
.logo-badge { background: var(--accent); color: #0f1b2d; border-radius: 6px; padding: 3px 8px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
.geo-btn {
  background: var(--card); border: 1px solid var(--card-b); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  color: white; border-radius: 50px; padding: 10px 18px; font-family: 'Syne', sans-serif; font-size: 0.8rem; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 8px; transition: all .2s ease; white-space: nowrap;
}
.geo-btn:hover { background: rgba(255,255,255,0.18); border-color: rgba(255,255,255,0.3); }

/* ─── SEARCH (FIXED SEARCH) ─── */
.search-wrap { position: relative; margin-bottom: 28px; z-index: 100; }
.search-in {
  width: 100%; background: var(--card); border: 1px solid var(--card-b); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  color: white; border-radius: 50px; padding: 16px 52px 16px 24px; font-size: 1rem; font-family: 'Syne', sans-serif; outline: none; transition: all .2s ease;
}
.search-in::placeholder { color: rgba(255,255,255,.35); }
.search-in:focus { border-color: rgba(255,255,255,.45); background: rgba(255,255,255,.12); }
.search-ico { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); opacity: .6; pointer-events: none; }
.ac {
  position: absolute; top: calc(100% + 8px); left: 0; right: 0;
  background: rgba(13, 23, 42, 0.98); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border: 1px solid rgba(255,255,255,0.15); border-radius: 20px; overflow: hidden; box-shadow: 0 16px 40px rgba(0,0,0,0.6);
}
.ac-item { padding: 14px 22px; cursor: pointer; font-size: .9rem; border-bottom: 1px solid rgba(255,255,255,.05); transition: background .2s; display: flex; align-items: center; gap: 14px; }
.ac-item:last-child { border: none; }
.ac-item:hover { background: rgba(255,255,255,.08); }
.ac-city { font-weight: 600; color: #fff; }
.ac-sub { font-size: .75rem; opacity: .5; margin-top: 3px; }

#content { display: flex; flex-direction: column; gap: 16px; }

/* ─── HERO NARRATIVE (LA ESTRELLA DE LA PÁGINA) ─── */
.hero-narrative-card {
  background: linear-gradient(135deg, rgba(232,255,87,0.12) 0%, rgba(255,255,255,0.03) 100%);
  border: 2px solid rgba(232,255,87,0.3); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
  border-radius: var(--r); padding: 32px 28px; position: relative; overflow: hidden;
}
.hero-loc { font-size: .85rem; font-weight: 700; color: var(--accent); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 8px; }
.hero-city { font-size: 2.5rem; font-weight: 800; letter-spacing: -1px; line-height: 1.1; margin-bottom: 16px; }
.hero-text { font-size: 1.35rem; font-weight: 600; line-height: 1.5; color: #ffffff; letter-spacing: -0.2px; }

/* ─── MINI TEMPERATURE CHIP ─── */
.mini-weather-row { display: flex; align-items: center; justify-content: space-between; margin-top: 24px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.08); }
.mini-temp { font-size: 3.5rem; font-weight: 800; letter-spacing: -2px; line-height: 1; }
.mini-temp sup { font-size: 1.5rem; opacity: .7; }
.mini-meta { text-align: right; }
.mini-cond { font-weight: 700; background: rgba(255,255,255,0.1); padding: 6px 14px; border-radius: 50px; font-size: .85rem; display: inline-block; margin-bottom: 4px; }
.mini-hl { font-size: .8rem; opacity: .5; }

/* ─── STATS & OTHERS ─── */
.stats-grid { display: grid; grid-template-columns: repeat(4,1fr); gap: 12px; }
@media(max-width:480px){ .stats-grid{ grid-template-columns:repeat(2,1fr); } }
.stat { background: var(--card); border: 1px solid var(--card-b); border-radius: 18px; padding: 16px 12px; text-align: center; }
.stat-sym { font-size: 1.5rem; font-family: 'Syne Mono'; margin-bottom: 6px; }
.stat-val { font-size: 1.1rem; font-weight: 700; }
.stat-lbl { font-size: .68rem; opacity: .5; margin-top: 4px; text-transform: uppercase; font-weight: 600; }

.humidity-card { background: var(--card); border: 1px solid var(--card-b); border-radius: var(--r); padding: 22px; display: flex; align-items: center; gap: 22px; }
.hum-circle { position: relative; width: 75px; height: 75px; flex-shrink: 0; }
.hum-circle svg { width: 75px; height: 75px; transform: rotate(-90deg); }
.hum-circle .track { fill: none; stroke: rgba(255,255,255,.1); stroke-width: 6; }
.hum-circle .fill { fill: none; stroke-width: 6; stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
.hum-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 1.05rem; font-weight: 800; }
.hum-desc { font-size: .92rem; font-weight: 500; color: rgba(255,255,255,0.9); margin-top: 4px; }

.hourly-scroll, .forecast-row { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 6px; scrollbar-width: none; }
.hourly-scroll::-webkit-scrollbar, .forecast-row::-webkit-scrollbar { display: none; }
.h-chip { background: var(--card); border: 1px solid var(--card-b); border-radius: 24px; padding: 14px 16px; text-align: center; min-width: 72px; }
.h-chip.now { background: rgba(232,255,87,.14); border-color: rgba(232,255,87,.35); }
.h-t { font-size: .7rem; opacity: .5; font-weight: 700; }
.h-sym { font-size: 1.2rem; font-family: 'Syne Mono'; margin: 4px 0; }
.h-tmp { font-size: .95rem; font-weight: 700; }

.fc-day { background: var(--card); border: 1px solid var(--card-b); border-radius: 18px; padding: 16px 14px; text-align: center; min-width: 84px; flex: 1; }
.fc-name { font-size: .7rem; opacity: .5; font-weight: 700; }
.fc-sym { font-size: 1.4rem; font-family: 'Syne Mono'; margin: 6px 0; }
.fc-max { font-size: 1.05rem; font-weight: 700; }
.fc-min { font-size: .75rem; opacity: .4; }

.rec-card { background: rgba(232,255,87,.05); border: 1px solid rgba(232,255,87,.2); border-radius: var(--r); padding: 20px; }
.rec-hdr { font-size: .72rem; opacity: .7; text-transform: uppercase; font-weight: 700; margin-bottom: 12px; }
.rec-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.rec-pill { background: rgba(255,255,255,.08); border: 1px solid rgba(255,255,255,.1); border-radius: 30px; padding: 6px 14px; font-size: .85rem; font-weight: 600; }

/* ─── CHAT INTELIGENTE REPARADO ─── */
.chat-wrap { background: rgba(0,0,0,0.2); border: 1px solid var(--card-b); border-radius: var(--r); padding: 20px; }
.chat-msgs { max-height: 280px; overflow-y: auto; margin-bottom: 14px; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; }
.msg { max-width: 85%; padding: 12px 18px; border-radius: 18px; font-size: .9rem; line-height: 1.5; animation: msgin .25s ease both; }
@keyframes msgin { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:none} }
.msg.u { background: rgba(232,255,87,.15); border: 1px solid rgba(232,255,87,.3); align-self: flex-end; border-bottom-right-radius: 4px; }
.msg.b { background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1); align-self: flex-start; border-bottom-left-radius: 4px; }
.chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
.chip { background: rgba(255,255,255,.06); border: 1px solid rgba(255,255,255,.1); border-radius: 50px; padding: 6px 14px; font-size: .75rem; cursor: pointer; transition: all .2s; }
.chip:hover { background: rgba(232,255,87,.15); border-color: var(--accent); }
.chat-row { display: flex; gap: 10px; }
.chat-in { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--card-b); color: white; border-radius: 50px; padding: 14px 22px; font-family: 'Syne', sans-serif; font-size: .92rem; outline: none; }
.chat-in:focus { border-color: var(--accent); }
.send-btn { background: var(--accent); color: #0f1b2d; border: none; border-radius: 50%; width: 48px; height: 48px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }

.sec-lbl { font-size: .72rem; opacity: .45; letter-spacing: 1.5px; text-transform: uppercase; font-weight: 700; margin-top: 10px; margin-bottom: 4px; }
.welcome { text-align: center; padding: 80px 20px; }
.welcome-sym { font-size: 4.5rem; font-family: 'Syne Mono'; margin-bottom: 16px; color: var(--accent); }
.welcome h2 { font-size: 2.2rem; font-weight: 800; margin-bottom: 12px; }
.welcome p { opacity: .6; font-size: .95rem; line-height: 1.7; max-width: 320px; margin: 0 auto; }
</style>
</head>
<body>

<div class="bg" id="bg"></div>
<div class="bg-mesh" id="mesh">
  <div class="orb" id="orb1" style="width:500px;height:500px;top:-150px;right:-100px;"></div>
  <div class="orb" id="orb2" style="width:400px;height:400px;bottom:-100px;left:-100px;"></div>
  <div class="orb" id="orb3" style="width:250px;height:250px;top:40%;left:40%;"></div>
</div>
<div class="particles" id="particles"></div>

<div class="app">
  <div class="header">
    <div class="logo">Clima <span class="logo-badge">para dummies</span></div>
    <button class="geo-btn" id="geoBtn">Mi ubicación</button>
  </div>

  <div class="search-wrap">
    <input class="search-in" id="srch" type="text" placeholder="Escribí cualquier pueblo, playa o ciudad..." autocomplete="off">
    <span class="search-ico">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </span>
    <div class="ac" id="ac" style="display:none"></div>
  </div>

  <div id="content">
    <div class="welcome">
      <div class="welcome-sym">☀</div>
      <h2>Clima para Dummies</h2>
      <p>Sin tecnicismos pesados. Sin vueltas.<br>Buscá tu rincón en el mapa para saber qué onda el día hoy.</p>
    </div>
  </div>
</div>

<script>
let wd = null, loc = null, acTimer = null;

function wSym(code, day=true) {
  if (code===0) return day ? '☀' : '☽';
  if (code<=2) return day ? '⛅' : '☁';
  if (code===3) return '☁';
  if ([45,48].includes(code)) return '◎';
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return '⛆';
  if ([71,73,75,77,85,86].includes(code)) return '❄';
  if ([95,96,99].includes(code)) return '⚡';
  return '~';
}

function wText(code) {
  const m={0:'Despejado',1:'Casi despejado',2:'Algo nublado',3:'Nublado',45:'Niebla',48:'Niebla con escarcha',51:'Llovizna leve',53:'Llovizna',55:'Llovizna fuerte',61:'Lluvia leve',63:'Lluvia',65:'Lluvia fuerte',71:'Nieve leve',73:'Nieve',75:'Nieve fuerte',77:'Granizo',80:'Chaparrones',81:'Chaparrones mod.',82:'Chaparrones fuertes',85:'Nevadas',86:'Nevadas fuertes',95:'Tormenta eléctrica',96:'Tormenta con granizo',99:'Tormenta pesada'};
  return m[code]||'Variable';
}

// Generador de descripciones divertidas sin tecnicismos
function generateFunnyNarrative(c, d) {
  const t = Math.round(c.temperature_2m);
  const feels = Math.round(c.apparent_temperature);
  const code = c.weather_code;
  const rain = d.precipitation_sum[0];
  const wind = c.wind_speed_10m;
  const uv = d.uv_index_max[0];

  let phrases = [];

  // Condición base
  if ([95,96,99].includes(code)) {
    phrases.push("Se cae el cielo abajo. Hay truenos, relámpagos y una pinta de que San Pedro está reordenando los muebles.");
  } else if (rain > 2) {
    phrases.push("Está lloviendo lindo. Ideal para cancelar planes, mirar una peli y llenarse de culpa por no hacer nada productivo.");
  } else if ([45,48].includes(code)) {
    phrases.push("Hay tanta niebla que si salís te chocás contra un árbol. Visibilidad modo Silent Hill activada.");
  } else if (t >= 30) {
    phrases.push("Hace un calor de locos. Caminás media cuadra y ya sos un charco humano. Ventilador o muerte.");
  } else if (t <= 11) {
    phrases.push("Hace un frío que te parte. Te metés las manos en los bolsillos y no las sacás hasta la primavera.");
  } else if (code === 0) {
    phrases.push("El cielo está más limpio que tu cuenta bancaria a fin de mes. Un solcito hermoso.");
  } else {
    phrases.push("Día gris, ni fu ni fa. El cielo tiene el color de una media vieja, pero se puede salir sin drama.");
  }

  // Sensación térmica vs Real
  if (feels > t + 2) {
    phrases.push(`Ojo, el termómetro dice ${t}° pero la pesadez te la hace sentir de ${feels}°. Es una trampa húmeda.`);
  } else if (feels < t - 2) {
    phrases.push(`Hay un vientito traicionero. Dice ${t}° pero salís y te congelás como si hicieran ${feels}°. Ponete un buzo.`);
  }

  // Extras graciosos (Viento / UV)
  if (wind > 28) phrases.push("El viento te va a despeinar hasta las ideas. Agarrate la gorra.");
  if (uv >= 7) phrases.push("El índice UV está picado. Si no te ponés protector solar vas a quedar como un tomate en ensalada.");

  return phrases.join(" ");
}

const THEMES = {
  sunny:  { bg:'#0a1628', o1:'rgba(255,200,50,.25)', o2:'rgba(50,120,255,.15)', o3:'rgba(255,150,0,.1)', px:'none' },
  cloudy: { bg:'#111a28', o1:'rgba(100,130,160,.2)', o2:'rgba(60,80,110,.15)', o3:'rgba(80,100,130,.1)', px:'none' },
  rainy:  { bg:'#0a1120', o1:'rgba(40,80,200,.25)', o2:'rgba(20,50,150,.2)', o3:'rgba(60,100,220,.1)', px:'rain' },
  stormy: { bg:'#050810', o1:'rgba(80,0,160,.25)', o2:'rgba(20,30,80,.3)', o3:'rgba(150,50,255,.1)', px:'rain' },
  snowy:  { bg:'#0f1724', o1:'rgba(180,210,255,.2)', o2:'rgba(100,140,200,.15)', o3:'rgba(200,220,255,.08)', px:'snow' },
  foggy:  { bg:'#101824', o1:'rgba(120,140,160,.2)', o2:'rgba(80,100,130,.15)', o3:'rgba(100,120,150,.08)', px:'none' },
  night:  { bg:'#030710', o1:'rgba(50,30,120,.2)', o2:'rgba(20,10,60,.2)', o3:'rgba(80,60,180,.08)', px:'none' },
};

function applyTheme(code, day) {
  let k = 'sunny';
  if (!day) k = 'night';
  else if ([95,96,99].includes(code)) k = 'stormy';
  else if ([61,63,65,80,81,82].includes(code)) k = 'rainy';
  else if ([71,73,75,77,85,86].includes(code)) k = 'snowy';
  else if ([45,48].includes(code)) k = 'foggy';
  else if ([1,2,3].includes(code)) k = 'cloudy';

  const t = THEMES[k] || THEMES.sunny;
  document.getElementById('bg').style.background = t.bg;
  document.getElementById('orb1').style.background = `radial-gradient(circle, ${t.o1} 0%, transparent 70%)`;
  document.getElementById('orb2').style.background = `radial-gradient(circle, ${t.o2} 0%, transparent 70%)`;
  document.getElementById('orb3').style.background = `radial-gradient(circle, ${t.o3} 0%, transparent 70%)`;
  
  const p = document.getElementById('particles');
  p.innerHTML = '';
  if (t.px === 'rain') {
    for(let i=0;i<35;i++){
      const d=document.createElement('div'); d.className='raindrop';
      d.style.cssText=`left:${Math.random()*100}vw;height:${15+Math.random()*15}px;animation-duration:${.4+Math.random()*.3}s;animation-delay:${Math.random()*2}s`;
      p.appendChild(d);
    }
  } else if (t.px === 'snow') {
    for(let i=0;i<20;i++){
      const s=document.createElement('div'); s.className='flake'; const sz=2+Math.random()*3;
      s.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;animation-duration:${3+Math.random()*3}s;animation-delay:${Math.random()*3}s`;
      p.appendChild(s);
    }
  }
}

async function fetchWeather(lat, lon, name, country) {
  const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,precipitation,weather_code,is_day,uv_index&hourly=temperature_2m,weather_code&daily=weather_code,temperature_2m_max,temperature_2m_min,precipitation_sum,uv_index_max,wind_speed_10m_max&timezone=auto&forecast_days=7`;
  try {
    const r = await fetch(url);
    wd = await r.json();
    loc = {name, country};
    render();
  } catch (err) {
    alert("Error bajando los datos del clima.");
  }
}

function render() {
  const c = wd.current, d = wd.daily, h = wd.hourly;
  const day = c.is_day===1;
  applyTheme(c.weather_code, day);

  const funnyText = generateFunnyNarrative(c, d);

  let hHtml=''; let now=new Date(); let cnt=0;
  for(let i=0; i<h.time.length && cnt<10; i++){
    const t=new Date(h.time[i]);
    if(t < now - 3600000) continue;
    const isNow=cnt===0;
    hHtml+=`<div class="h-chip${isNow?' now':''}">
      <div class="h-t">${isNow?'AHORA':t.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div>
      <div class="h-sym">${wSym(h.weather_code[i], t.getHours()>6 && t.getHours()<20)}</div>
      <div class="h-tmp">${Math.round(h.temperature_2m[i])}°</div>
    </div>`;
    cnt++;
  }

  const dns=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
  let fcHtml='';
  for(let i=0;i<5;i++){
    const nd=new Date(d.time[i]);
    fcHtml+=`<div class="fc-day">
      <div class="fc-name">${i===0?'HOY':i===1?'MAÑANA':dns[nd.getDay()].toUpperCase()}</div>
      <div class="fc-sym">${wSym(d.weather_code[i])}</div>
      <div class="fc-max">${Math.round(d.temperature_2m_max[i])}°</div>
      <div class="fc-min">${Math.round(d.temperature_2m_min[i])}°</div>
    </div>`;
  }

  // Recomendaciones de mochila
  const recs=[];
  if(c.temperature_2m>26) recs.push('Ropa cortita y botellita de agua');
  else if(c.temperature_2m<13) recs.push('Campera que abrigue en serio');
  else recs.push('Un bucito por las dudas');
  if(d.precipitation_sum[0]>1) recs.push('Paraguas (salvo que te guste mojarte)');
  if(d.uv_index_max[0]>=5) recs.push('Protector solar para no quedar como un tomate');

  const C=2*Math.PI*34, filled=C*(c.relative_humidity_2m/100);

  document.getElementById('content').innerHTML = `
    <div class="hero-narrative-card">
      <div class="hero-loc">📍 ${loc.name}, ${loc.country || 'Planeta Tierra'}</div>
      <div class="hero-text">"${funnyText}"</div>
      
      <div class="mini-weather-row">
        <div class="mini-temp">${Math.round(c.temperature_2m)}<sup>°C</sup></div>
        <div class="mini-meta">
          <div class="mini-cond">${wText(c.weather_code)}</div>
          <div class="mini-hl">Máx: ${Math.round(d.temperature_2m_max[0])}° | Mín: ${Math.round(d.temperature_2m_min[0])}°</div>
        </div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat"><div class="stat-sym">≋</div><div class="stat-val">${Math.round(c.wind_speed_10m)} km/h</div><div class="stat-lbl">Viento</div></div>
      <div class="stat"><div class="stat-sym">◉</div><div class="stat-val">${d.precipitation_sum[0]} mm</div><div class="stat-lbl">Agua caída</div></div>
      <div class="stat"><div class="stat-sym">◈</div><div class="stat-val">UV ${Math.round(c.uv_index)}</div><div class="stat-lbl">Rayos UV</div></div>
      <div class="stat"><div class="stat-sym">▲</div><div class="stat-val">${Math.round(d.wind_speed_10m_max[0])} km/h</div><div class="stat-lbl">Ráfagas</div></div>
    </div>

    <div class="humidity-card">
      <div class="hum-circle">
        <svg viewBox="0 0 80 80">
          <circle class="track" cx="40" cy="40" r="34"/>
          <circle class="fill" cx="40" cy="40" r="34" stroke="#E8FF57" stroke-dasharray="${C}" stroke-dashoffset="${C - filled}" transform="rotate(-90 40 40)"/>
        </svg>
        <div class="hum-num">${c.relative_humidity_2m}%</div>
      </div>
      <div class="hum-info">
        <div class="hum-title">Humedad ambiente</div>
        <div class="hum-desc">${c.relative_humidity_2m > 75 ? 'El aire es prácticamente sopa flotante.' : c.relative_humidity_2m < 35 ? 'Más seco que desierto de película.' : 'Humedad decente, se puede respirar sin esfuerzo.'}</div>
      </div>
    </div>

    <div class="sec-lbl">El día hora por hora</div>
    <div class="hourly-scroll">${hHtml}</div>

    <div class="sec-lbl">Los próximos días</div>
    <div class="forecast-row">${fcHtml}</div>

    <div class="rec-card">
      <div class="rec-hdr">— Qué meter en la mochila hoy</div>
      <div class="rec-pills">${recs.map(i=>`<span class="rec-pill">${i}</span>`).join('')}</div>
    </div>

    <div class="chat-wrap">
      <div class="sec-lbl">Preguntale al asistente de clima</div>
      <div class="chips">
        <span class="chip" onclick="sq('¿Me voy a mojar hoy?')">¿Va a llover hoy?</span>
        <span class="chip" onclick="sq('¿Qué ropa me pongo?')">¿Qué me pongo?</span>
        <span class="chip" onclick="sq('¿Cómo se viene el finde?')">¿Qué onda el finde?</span>
      </div>
      <div class="chat-msgs" id="cm"></div>
      <div class="chat-row">
        <input class="chat-in" id="ci" placeholder="Escribí tu pregunta sobre el tiempo acá..." onkeydown="if(event.key==='Enter')sc()">
        <button class="send-btn" onclick="sc()">➔</button>
      </div>
    </div>
  `;
}

// ─── CHAT INTELIGENTE LOCAL DINÁMICO ───
function sc() {
  const inp = document.getElementById('ci'), msg = inp.value.trim();
  if(!msg || !wd) return;
  inp.value = '';
  addM(msg, 'u');
  
  setTimeout(() => {
    let response = `Mirá, de reojo veo que en ${loc.name} hacen unos ${Math.round(wd.current.temperature_2m)}°C. ¿Querés saber algo específico sobre la lluvia, el finde o la ropa?`;
    const m = msg.toLowerCase();
    
    if (m.includes('lluvia') || m.includes('llover') || m.includes('mojar') || m.includes('agua') || m.includes('paraguas')) {
      const rain = wd.daily.precipitation_sum[0];
      response = rain > 1.5 
        ? `¡Sí! Hay ${rain} mm de lluvia anotados para hoy en ${loc.name}. Si salís sin paraguas o piloto te vas a arrepentir fuerte.` 
        : `De lluvia venimos zafando impecable. Hay un total de ${rain} mm estimado, o sea, casi nada. Podés dejar el paraguas tranquilo.`;
    } 
    else if (m.includes('ropa') || m.includes('abrig') || m.includes('ponerme') || m.includes('pongo') || m.includes('short')) {
      const t = wd.current.temperature_2m;
      if (t >= 26) {
        response = `En ${loc.name} hacen ${Math.round(t)}°C. Salí de short, remera suelta y lentes. Cualquier otra cosa es una tortura autoinducida.`;
      } else if (t <= 13) {
        response = `Hace frío lindo (${Math.round(t)}°C). Campera pesada de una. No te hagas el valiente que la vas a pasar mal.`;
      } else {
        response = `Día ideal para vestirse tipo cebolla: remera y un buzo arriba. Con ${Math.round(t)}°C si caminás te da calor, pero si te parás te refrescás.`;
      }
    } 
    else if (m.includes('fin de semana') || m.includes('finde') || m.includes('sábado') || m.includes('domingo')) {
      const nextCode = wd.daily.weather_code[2] || wd.daily.weather_code[1];
      response = `Para el finde en ${loc.name} se proyecta un cielo principalmente ${wText(nextCode).toLowerCase()}. Pegale una mirada al bloque de arriba antes de armar un asado al aire libre.`;
    }
    else if (m.includes('entrenar') || m.includes('deporte') || m.includes('correr') || m.includes('plaza')) {
      if (wd.current.temperature_2m > 29) {
        response = `Uff, con este calor correr es un intento de suicidio deportivo. Si vas a ir, llevate tres litros de agua o esperá a la noche.`;
      } else if (wd.daily.precipitation_sum[0] > 2) {
        response = `Está para hacer flexiones en el living de tu casa. Afuera te vas a patinar y mojar de arriba a abajo.`;
      } else {
        response = `¡Clave! El tiempo está ideal para mover el esqueleto al aire libre en ${loc.name}. Dale sin vueltas.`;
      }
    }
    
    addM(response, 'b');
  }, 400);
}

function sq(q){ document.getElementById('ci').value=q; sc(); }
function addM(t,cls){
  const div=document.getElementById('cm'); if(!div) return;
  const m=document.createElement('div'); m.className=`msg ${cls}`; m.textContent=t;
  div.appendChild(m); div.scrollTop=div.scrollHeight;
}

// ─── BUSCADOR GLOBAL REPARADO (Usa Nominatim OpenStreetMap - Encuentra TODO) ───
document.getElementById('srch').addEventListener('input', function() {
  clearTimeout(acTimer);
  const q = this.value.trim();
  if(q.length < 2) { document.getElementById('ac').style.display = 'none'; return; }
  
  acTimer = setTimeout(async () => {
    try {
      // Endpoint ultra receptivo para ciudades, barrios, playas o pueblos de cualquier país
      const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&addressdetails=1&limit=5&accept-language=es`);
      const data = await r.json();
      const ac = document.getElementById('ac');
      
      if(!data || data.length === 0) { ac.style.display = 'none'; return; }
      
      ac.innerHTML = data.map(item => {
        const name = item.address.city || item.address.town || item.address.village || item.address.municipality || item.address.road || item.display_name.split(',')[0];
        const state = item.address.state ? item.address.state + ', ' : '';
        const country = item.address.country || '';
        
        return `<div class="ac-item" onclick="selCity(${item.lat}, ${item.lon}, '${name.replace(/'/g, "\\'")}', '${country.replace(/'/g, "\\'")}')">
          <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor" opacity=".5"><circle cx="12" cy="10" r="3"/><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/></svg>
          <div>
            <div class="ac-city">${name}</div>
            <div class="ac-sub">${state}${country}</div>
          </div>
        </div>`;
      }).join('');
      ac.style.display = 'block';
    } catch(e) { console.error(e); }
  }, 350);
});

document.addEventListener('click', e => { if(!e.target.closest('.search-wrap')) document.getElementById('ac').style.display='none'; });

function selCity(lat, lon, name, country){
  document.getElementById('srch').value = name;
  document.getElementById('ac').style.display = 'none';
  fetchWeather(lat, lon, name, country);
}

// ─── GEOLOCALIZACIÓN ───
document.getElementById('geoBtn').onclick = () => {
  if(!navigator.geolocation) return;
  document.getElementById('geoBtn').textContent = 'Ubicando...';
  navigator.geolocation.getCurrentPosition(async pos => {
    const {latitude:lat, longitude:lon} = pos.coords;
    try {
      const nr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`);
      const nd = await nr.json();
      const city = nd.address.city || nd.address.town || nd.address.village || nd.address.municipality || 'Mi ubicación';
      document.getElementById('geoBtn').textContent = city;
      document.getElementById('srch').value = city;
      fetchWeather(lat, lon, city, nd.address.country || '');
    } catch { fetchWeather(lat, lon, 'Mi ubicación', ''); }
  }, () => {
    document.getElementById('geoBtn').textContent = 'Mi ubicación';
    alert("No se pudo leer tu geolocalización.");
  });
};

// Carga inicial por defecto si acepta permisos
window.addEventListener('load', () => {
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(async pos => {
      const {latitude:lat, longitude:lon} = pos.coords;
      try {
        const nr = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=es`);
        const nd = await nr.json();
        const city = nd.address.city || nd.address.town || nd.address.village || nd.address.municipality || 'Mi ubicación';
        document.getElementById('geoBtn').textContent = city;
        document.getElementById('srch').value = city;
        fetchWeather(lat, lon, city, nd.address.country || '');
      } catch { fetchWeather(lat, lon, 'Mi ubicación', ''); }
    }, () => {});
  }
});
</script>
