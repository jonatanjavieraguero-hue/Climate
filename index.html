<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima para Dummies</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --card:rgba(255,255,255,0.07);
  --card-b:rgba(255,255,255,0.13);
  --blur:blur(22px);
  --r:22px;
  --accent:#E8FF57;
}
body{font-family:'Syne',sans-serif;min-height:100vh;color:#fff;overflow-x:hidden;background:#080f1e;}

/* ── BG ── */
.bg{position:fixed;inset:0;z-index:0;transition:background 2.5s ease;}
.orb{position:absolute;border-radius:50%;filter:blur(90px);transition:all 2.5s ease;pointer-events:none;}
.particles{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden;}
.raindrop{position:absolute;width:1.5px;background:linear-gradient(180deg,transparent,rgba(160,210,255,.55));animation:rain linear infinite;opacity:0;}
@keyframes rain{0%{transform:translateY(-30px) skewX(-8deg);opacity:.5}100%{transform:translateY(110vh) skewX(-8deg);opacity:0}}
.flake{position:absolute;background:rgba(255,255,255,.75);border-radius:50%;animation:flk linear infinite;opacity:0;}
@keyframes flk{0%{transform:translateY(-10px) translateX(0);opacity:.7}50%{transform:translateY(50vh) translateX(18px)}100%{transform:translateY(110vh) translateX(-8px);opacity:0}}

/* ── LAYOUT ── */
.app{position:relative;z-index:10;max-width:680px;margin:0 auto;padding:26px 18px 120px;}

/* ── HEADER ── */
.hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;animation:dn .45s ease both;}
.logo{font-size:1.2rem;font-weight:800;letter-spacing:-.3px;display:flex;align-items:center;gap:8px;}
.badge{background:var(--accent);color:#08101e;border-radius:6px;padding:2px 8px;font-size:.62rem;font-weight:800;letter-spacing:1px;text-transform:uppercase;}
.geo-btn{background:var(--card);border:1px solid var(--card-b);backdrop-filter:var(--blur);color:#fff;border-radius:50px;padding:8px 16px;font-family:'Syne',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;white-space:nowrap;}
.geo-btn:hover{background:rgba(255,255,255,.15);}

/* ── SEARCH — z-index crítico ── */
.search-wrap{position:relative;margin-bottom:20px;animation:dn .45s .07s ease both;z-index:9999;}
.search-in{width:100%;background:var(--card);border:1px solid var(--card-b);backdrop-filter:var(--blur);color:#fff;border-radius:50px;padding:13px 48px 13px 20px;font-size:.92rem;font-family:'Syne',sans-serif;font-weight:500;outline:none;transition:all .2s;}
.search-in::placeholder{color:rgba(255,255,255,.35);}
.search-in:focus{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.12);}
.s-ico{position:absolute;right:17px;top:50%;transform:translateY(-50%);opacity:.4;pointer-events:none;}
/* Dropdown sobre TODO */
.ac{
  position:absolute;top:calc(100% + 6px);left:0;right:0;
  z-index:99999;
  background:rgba(6,14,32,.98);
  backdrop-filter:var(--blur);
  border:1px solid rgba(255,255,255,.18);
  border-radius:18px;
  overflow:hidden;
  box-shadow:0 16px 48px rgba(0,0,0,.7);
  display:none;
}
.ac-item{padding:12px 18px;cursor:pointer;font-size:.86rem;border-bottom:1px solid rgba(255,255,255,.06);transition:background .12s;display:flex;align-items:center;gap:10px;}
.ac-item:last-child{border:none;}
.ac-item:hover{background:rgba(255,255,255,.1);}
.ac-city{font-weight:700;color:#fff;}
.ac-sub{font-size:.7rem;opacity:.45;margin-top:1px;}
.ac-source{font-size:.6rem;opacity:.3;margin-left:auto;flex-shrink:0;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--card-b);backdrop-filter:var(--blur);border-radius:var(--r);padding:22px 24px;margin-bottom:12px;position:relative;overflow:hidden;}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.05) 0%,transparent 55%);pointer-events:none;}

/* ── MAIN ── */
.loc-line{font-size:.72rem;font-weight:700;opacity:.5;letter-spacing:.6px;text-transform:uppercase;margin-bottom:3px;}
.city-h{font-size:2.1rem;font-weight:800;line-height:1;letter-spacing:-1px;margin-bottom:2px;}
.date-h{font-size:.72rem;opacity:.4;margin-bottom:18px;}
.temp-row{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
.big-t{font-size:5.5rem;font-weight:800;line-height:1;letter-spacing:-5px;}
.big-t sup{font-size:2rem;vertical-align:top;margin-top:12px;opacity:.55;letter-spacing:0;}
.t-right{text-align:right;}
.feels{font-size:.76rem;opacity:.5;margin-bottom:6px;}
.cpill{display:inline-flex;align-items:center;gap:7px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.16);border-radius:20px;padding:5px 13px;font-size:.76rem;font-weight:700;}
.wsym{font-size:3rem;font-family:'Syne Mono',monospace;line-height:1;}
.hilo{font-size:.72rem;opacity:.45;margin-top:3px;}

/* ── NARRATIVA ── */
.narrative{background:rgba(0,0,0,.25);border-left:3px solid var(--accent);border-radius:0 12px 12px 0;padding:14px 17px;font-size:.9rem;line-height:1.68;font-style:italic;color:rgba(255,255,255,.88);margin-top:12px;min-height:54px;transition:opacity .4s;}
.nar-dots{display:flex;align-items:center;gap:6px;font-size:.78rem;opacity:.45;font-style:normal;}
.dot{width:5px;height:5px;border-radius:50%;background:#fff;animation:dp 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}.dot:nth-child(3){animation-delay:.4s;}
@keyframes dp{0%,80%,100%{opacity:.2;transform:scale(1)}40%{opacity:1;transform:scale(1.3)}}

/* ── STATS ── */
.sgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-bottom:12px;}
@media(max-width:460px){.sgrid{grid-template-columns:repeat(2,1fr);}}
.stat{background:var(--card);border:1px solid var(--card-b);backdrop-filter:var(--blur);border-radius:16px;padding:13px 10px;text-align:center;transition:transform .2s;}
.stat:hover{transform:translateY(-2px);}
.ssym{font-size:1.3rem;font-family:'Syne Mono',monospace;margin-bottom:5px;line-height:1;}
.sval{font-size:1rem;font-weight:700;letter-spacing:-.3px;}
.slbl{font-size:.62rem;opacity:.4;margin-top:2px;letter-spacing:.5px;text-transform:uppercase;font-weight:700;}

/* ── HUMEDAD ── */
.hcard{display:flex;align-items:center;gap:18px;}
.hcirc{position:relative;width:76px;height:76px;flex-shrink:0;}
.hcirc svg{width:76px;height:76px;}
.hnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.95rem;font-weight:800;}
.htitle{font-size:.65rem;opacity:.4;text-transform:uppercase;letter-spacing:.8px;font-weight:700;margin-bottom:5px;}
.hdesc{font-size:.88rem;font-weight:500;line-height:1.45;}
.hbar{display:flex;gap:3px;margin-top:9px;}
.hseg{height:3px;flex:1;border-radius:2px;background:rgba(255,255,255,.1);transition:background .9s;}

/* ── SOL + LUNA ── */
.smrow{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:14px;}
.smt{text-align:center;}
.smt:last-child{text-align:right;}
.tv{font-size:1.1rem;font-weight:800;letter-spacing:-.5px;}
.tl{font-size:.63rem;opacity:.4;text-transform:uppercase;letter-spacing:.6px;font-weight:700;margin-top:1px;}
.arc-w{position:relative;height:36px;}
.arc-w svg{width:100%;height:72px;margin-top:-36px;}
.msec{border-top:1px solid rgba(255,255,255,.08);padding-top:13px;display:flex;align-items:center;gap:14px;}
.mglyph{font-size:2rem;font-family:'Syne Mono',monospace;line-height:1;}
.mph{font-size:.88rem;font-weight:700;}
.msu{font-size:.68rem;opacity:.4;margin-top:2px;}
.mrs{margin-left:auto;text-align:right;font-size:.7rem;opacity:.4;line-height:1.7;}

/* ── HOURLY ── */
.hscroll{display:flex;gap:7px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:12px;}
.hscroll::-webkit-scrollbar{display:none;}
.hchip{background:var(--card);border:1px solid var(--card-b);backdrop-filter:var(--blur);border-radius:40px;padding:10px 13px;text-align:center;min-width:60px;flex-shrink:0;}
.hchip.now{background:rgba(232,255,87,.12);border-color:rgba(232,255,87,.35);}
.ht{font-size:.62rem;opacity:.45;margin-bottom:4px;font-weight:700;}
.hsy{font-size:.95rem;font-family:'Syne Mono',monospace;margin-bottom:3px;}
.htm{font-size:.82rem;font-weight:700;}

/* ── FORECAST ── */
.fcrow{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px;margin-bottom:12px;}
.fcrow::-webkit-scrollbar{display:none;}
.fcd{background:var(--card);border:1px solid var(--card-b);backdrop-filter:var(--blur);border-radius:15px;padding:13px 10px;text-align:center;min-width:78px;flex-shrink:0;transition:all .2s;}
.fcd.act{background:rgba(232,255,87,.1);border-color:rgba(232,255,87,.4);}
.fcd:hover{transform:translateY(-2px);}
.fn{font-size:.62rem;opacity:.4;margin-bottom:7px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;}
.fs{font-size:1.3rem;font-family:'Syne Mono',monospace;margin-bottom:6px;}
.fm{font-size:.95rem;font-weight:700;}
.fmin{font-size:.7rem;opacity:.35;margin-top:1px;}
.frain{font-size:.65rem;opacity:.45;margin-top:3px;}

/* ── RECOM ── */
.rcard{background:rgba(232,255,87,.06);border:1px solid rgba(232,255,87,.18);backdrop-filter:var(--blur);border-radius:var(--r);padding:16px 18px;margin-bottom:12px;}
.rhdr{font-size:.65rem;opacity:.55;letter-spacing:.8px;text-transform:uppercase;font-weight:700;margin-bottom:8px;}
.rpills{display:flex;flex-wrap:wrap;gap:7px;}
.rp{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.12);border-radius:30px;padding:5px 13px;font-size:.8rem;font-weight:700;}

/* ── SECCIÓN LABEL ── */
.sec{font-size:.65rem;opacity:.35;letter-spacing:1.5px;text-transform:uppercase;font-weight:700;margin-bottom:9px;}

/* ── CHAT ── */
.cms{max-height:300px;overflow-y:auto;margin-bottom:9px;display:flex;flex-direction:column;gap:8px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,.1) transparent;padding-right:2px;}
.msg{max-width:86%;padding:11px 15px;border-radius:17px;font-size:.85rem;line-height:1.58;animation:msgin .3s ease both;}
@keyframes msgin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
.msg.u{background:rgba(232,255,87,.12);border:1px solid rgba(232,255,87,.25);align-self:flex-end;border-bottom-right-radius:4px;font-weight:600;}
.msg.b{background:rgba(0,0,0,.28);border:1px solid rgba(255,255,255,.08);align-self:flex-start;border-bottom-left-radius:4px;font-style:italic;}
.qchips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.qc{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.11);border-radius:20px;padding:5px 11px;font-size:.71rem;cursor:pointer;font-family:'Syne',sans-serif;font-weight:600;transition:all .2s;letter-spacing:.2px;}
.qc:hover{background:rgba(232,255,87,.12);border-color:rgba(232,255,87,.3);}
.crow{display:flex;gap:8px;}
.cin{flex:1;background:var(--card);border:1px solid var(--card-b);backdrop-filter:var(--blur);color:#fff;border-radius:50px;padding:12px 20px;font-family:'Syne',sans-serif;font-size:.86rem;outline:none;transition:border-color .2s;}
.cin::placeholder{color:rgba(255,255,255,.28);}
.cin:focus{border-color:rgba(232,255,87,.38);}
.sbtn{background:var(--accent);color:#08101e;border:none;border-radius:50%;width:44px;height:44px;font-size:.95rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .2s;font-weight:800;font-family:'Syne',sans-serif;}
.sbtn:hover{transform:scale(1.08);}

/* ── WELCOME ── */
.welcome{text-align:center;padding:65px 20px;animation:up .6s ease both;}
.wsym{font-size:3.8rem;font-family:'Syne Mono',monospace;margin-bottom:16px;}
.welcome h2{font-size:1.8rem;font-weight:800;letter-spacing:-1px;margin-bottom:9px;}
.welcome p{opacity:.42;font-size:.86rem;line-height:1.75;max-width:285px;margin:0 auto;}

@keyframes dn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<div class="bg" id="bg">
  <div class="orb" id="o1" style="width:500px;height:500px;top:-150px;right:-100px;"></div>
  <div class="orb" id="o2" style="width:400px;height:400px;bottom:-100px;left:-100px;"></div>
  <div class="orb" id="o3" style="width:240px;height:240px;top:38%;left:38%;"></div>
</div>
<div class="particles" id="pts"></div>

<div class="app">
  <div class="hdr">
    <div class="logo">Clima <span class="badge">para dummies</span></div>
    <button class="geo-btn" id="geoBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
      </svg>
      Mi ubicación
    </button>
  </div>

  <!-- SEARCH — sobre todo lo demás -->
  <div class="search-wrap">
    <input class="search-in" id="srch" type="text" placeholder="Buscar ciudad... (ej: Villa Mercedes, Neuquén, Rosario)" autocomplete="off" spellcheck="false">
    <span class="s-ico">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5">
        <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
      </svg>
    </span>
    <div class="ac" id="ac"></div>
  </div>

  <div id="cnt">
    <div class="welcome">
      <div class="wsym">◈</div>
      <h2>Clima para Dummies</h2>
      <p>Sin tecnicismos. Sin confusión.<br>Solo lo que necesitás saber para no cagarte de frío — ni de calor.</p>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const CLAUDE = 'https://api.anthropic.com/v1/messages';
const MODEL  = 'claude-sonnet-4-20250514';
let wd = null, loc = null, acTimer = null, chatH = [], narTimer = null;

// ─── SÍMBOLOS ─────────────────────────────────────────────────────────────────
function wSym(code, day=true) {
  if (code===0) return day?'☀':'☽';
  if (code<=2)  return day?'⛅':'☁';
  if (code===3) return '☁';
  if ([45,48].includes(code)) return '◎';
  if ([51,53,55,61,63,65,80,81,82].includes(code)) return '⛆';
  if ([71,73,75,77,85,86].includes(code)) return '❄';
  if ([95,96,99].includes(code)) return '⚡';
  return '~';
}
function wText(code) {
  const m={0:'Despejado',1:'Casi despejado',2:'Algo nublado',3:'Nublado',45:'Niebla',48:'Niebla con escarcha',51:'Llovizna leve',53:'Llovizna',55:'Llovizna fuerte',61:'Lluvia leve',63:'Lluvia',65:'Lluvia fuerte',71:'Nieve leve',73:'Nieve',75:'Nieve fuerte',77:'Granizo',80:'Chaparrones',81:'Chaparrones mod.',82:'Chaparrones fuertes',85:'Nevadas',86:'Nevadas fuertes',95:'Tormenta',96:'Tormenta c/ granizo',99:'Tormenta severa'};
  return m[code]||'Variable';
}

// ─── LUNA ─────────────────────────────────────────────────────────────────────
function moonPhase(date) {
  const syn=29.53, kn=new Date('2000-01-06');
  const d=((date-kn)/86400000%syn+syn)%syn;
  const phases=[['Luna Nueva','●',0,1.5],['Creciente','◐',1.5,7],['Cuarto Creciente','◑',7,9],['Gibosa Creciente','◕',9,14.5],['Luna Llena','○',14.5,16],['Gibosa Menguante','◔',16,21],['Cuarto Menguante','◒',21,23],['Menguante','◓',23,29.53]];
  for (const [name,g,a,b] of phases) if(d>=a&&d<b) return {name,g,pct:Math.round(d/syn*100)};
  return {name:'Luna Nueva',g:'●',pct:0};
}

// ─── HUMEDAD ──────────────────────────────────────────────────────────────────
function humDesc(h) {
  if (h<30) return {t:'Ambiente re seco. Piel sensible, ojo.', c:'rgba(255,180,80,.75)'};
  if (h<50) return {t:'Humedad ideal. El aire está impecable.', c:'rgba(80,220,140,.75)'};
  if (h<70) return {t:'Algo húmedo. La pesadez se empieza a notar.', c:'rgba(90,170,255,.75)'};
  if (h<85) return {t:'Bastante húmedo. Vas a transpirar de lo lindo.', c:'rgba(100,130,255,.75)'};
  return {t:'Humedad por las nubes. Un sauna andante.', c:'rgba(170,90,255,.75)'};
}

// ─── TEMA ─────────────────────────────────────────────────────────────────────
const TH={
  sunny: {b:'#080f1e',o1:'rgba(255,200,45,.32)',o2:'rgba(45,100,255,.18)',o3:'rgba(255,140,0,.14)',px:'none'},
  cloudy:{b:'#0e1520',o1:'rgba(90,115,145,.28)',o2:'rgba(50,70,100,.22)',o3:'rgba(70,90,120,.13)',px:'none'},
  rainy: {b:'#080e1c',o1:'rgba(35,70,200,.32)',o2:'rgba(15,40,140,.28)',o3:'rgba(55,90,210,.13)',px:'rain'},
  stormy:{b:'#060810',o1:'rgba(75,0,150,.28)',o2:'rgba(15,20,65,.38)',o3:'rgba(140,40,240,.1)',px:'rain'},
  snowy: {b:'#0e1624',o1:'rgba(160,195,255,.22)',o2:'rgba(90,125,190,.18)',o3:'rgba(185,210,255,.1)',px:'snow'},
  foggy: {b:'#0d141f',o1:'rgba(105,125,148,.22)',o2:'rgba(70,90,115,.18)',o3:'rgba(90,110,135,.1)',px:'none'},
  night: {b:'#030710',o1:'rgba(45,25,110,.28)',o2:'rgba(15,8,55,.28)',o3:'rgba(70,50,170,.1)',px:'none'},
};
function themeKey(code,day){
  if(!day) return 'night';
  if([95,96,99].includes(code)) return 'stormy';
  if([61,63,65,80,81,82].includes(code)) return 'rainy';
  if([71,73,75,77,85,86].includes(code)) return 'snowy';
  if([45,48].includes(code)) return 'foggy';
  if([1,2,3].includes(code)) return 'cloudy';
  return 'sunny';
}
function applyTheme(code,day){
  const t=TH[themeKey(code,day)];
  const bg=document.getElementById('bg');
  bg.style.background=t.b;
  document.getElementById('o1').style.background=`radial-gradient(circle,${t.o1} 0%,transparent 70%)`;
  document.getElementById('o2').style.background=`radial-gradient(circle,${t.o2} 0%,transparent 70%)`;
  document.getElementById('o3').style.background=`radial-gradient(circle,${t.o3} 0%,transparent 70%)`;
  const p=document.getElementById('pts');
  p.querySelectorAll('.raindrop,.flake').forEach(e=>e.remove());
  if(t.px==='rain'){for(let i=0;i<45;i++){const d=document.createElement('div');d.className='raindrop';d.style.cssText=`left:${Math.random()*100}vw;height:${14+Math.random()*18}px;animation-duration:${.38+Math.random()*.38}s;animation-delay:${Math.random()*2}s`;p.appendChild(d);}}
  else if(t.px==='snow'){for(let i=0;i<28;i++){const s=document.createElement('div');s.className='flake';const sz=2+Math.random()*4;s.style.cssText=`left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;animation-duration:${3+Math.random()*4}s;animation-delay:${Math.random()*4}s`;p.appendChild(s);}}
}

// ─── FETCH CLIMA — con sunrise/sunset ─────────────────────────────────────────
async function fetchWeather(lat, lon, name, country) {
  try {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
      + `&current=temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,precipitation,weather_code,is_day,uv_index`
      + `&hourly=temperature_2m,weather_code,precipitation_probability`
      + `&daily=weather_code,temperature_2m_max,temperature_2m_min,sunrise,sunset,precipitation_sum,precipitation_probability_max,uv_index_max,wind_speed_10m_max`
      + `&timezone=auto&forecast_days=14`;
    const r = await fetch(url);
    wd = await r.json();
    loc = {name, country, lat, lon};
    chatH = [];
    render();
  } catch(e) {
    alert('No se pudo obtener el clima. Verificá tu conexión a internet.');
  }
}

// ─── CONTEXTO COMPLETO PARA IA (14 días) ──────────────────────────────────────
function buildFullContext() {
  if (!wd || !loc) return '';
  const c = wd.current, d = wd.daily;
  const now = new Date();
  const dns = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];

  let forecastLines = '';
  for (let i=0; i<d.time.length; i++) {
    const dt = new Date(d.time[i]);
    const label = i===0?'HOY':i===1?'MAÑANA':`${dns[dt.getDay()]} ${dt.toLocaleDateString('es-ES',{day:'numeric',month:'short'})}`;
    forecastLines += `  • ${label}: ${wText(d.weather_code[i])}, máx ${Math.round(d.temperature_2m_max[i])}°C mín ${Math.round(d.temperature_2m_min[i])}°C, lluvia ${d.precipitation_sum[i]}mm (prob ${d.precipitation_probability_max[i]}%), viento máx ${Math.round(d.wind_speed_10m_max[i])}km/h\n`;
  }

  return `CIUDAD: ${loc.name}, ${loc.country}
FECHA/HORA ACTUAL: ${now.toLocaleString('es-ES')}

CONDICIÓN ACTUAL:
  Temperatura: ${Math.round(c.temperature_2m)}°C (sensación térmica: ${Math.round(c.apparent_temperature)}°C)
  Condición: ${wText(c.weather_code)}
  Humedad: ${c.relative_humidity_2m}%
  Viento: ${Math.round(c.wind_speed_10m)} km/h
  UV actual: ${c.uv_index}
  Es de día: ${c.is_day===1?'Sí':'No'}

PRONÓSTICO EXTENDIDO (14 días):
${forecastLines}`;
}

async function generateNarrative() {
  const el = document.getElementById('nar');
  if (!el) return;

  const c = wd.current, d = wd.daily;
  const hum = c.relative_humidity_2m;
  const uv = Math.round(d.uv_index_max[0]);
  const lluvia = d.precipitation_sum[0];
  const viento = Math.round(c.wind_speed_10m);

  const prompt = `Sos el meteorólogo más gracioso y relajado de Argentina. Tenés que escribir una reseña del clima de hoy para "${loc.name}" con EXACTAMENTE 3 oraciones.

REGLAS:
- Usá el lunfardo y el habla argentina rioplatense (vos, che, dale, de una, etc.)
- Sé gracioso y amable pero sin exagerar — como un amigo que te avisa por WhatsApp
- Incluí el dato más llamativo del día (si hace mucho frío, mucho calor, llueve, hay viento, UV alto, humedad extrema)
- Terminá con una recomendación concreta de qué hacer o qué ponerse
- NO uses palabras técnicas como "precipitaciones", "índice", "porcentaje"
- NO repitas la temperatura textualmente, describila (ej: "fresquito", "una heladera", "un horno")
- Varía el tono — a veces entusiasta, a veces quejoso, a veces filosófico

DATOS:
${buildFullContext().split('PRONÓSTICO')[0]}
Mañana: ${wText(d.weather_code[1])}, máx ${Math.round(d.temperature_2m_max[1])}°C

Escribí SOLO las 3 oraciones, sin título, sin comillas, sin emojis.`;

  try {
    const r = await fetch(CLAUDE, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({model:MODEL, max_tokens:300, messages:[{role:'user',content:prompt}]})
    });
    const data = await r.json();
    const txt = data.content?.[0]?.text?.trim() || fallbackNarrative();
    if (el) el.textContent = txt;
  } catch {

function fallbackNarrative() {
  const c = wd.current, d = wd.daily;
  const t = c.temperature_2m, code = c.weather_code;
  if (code===0 && t>28) return `Hoy en ${loc.name} el sol pega con todo, sin filtro. Está para quedarse en calzoncillo con el ventilador a full. Si salís, agua y protector — no seas pavote.`;
  if (code===0 && t>20) return `Día re lindo en ${loc.name}, de esos que te dan ganas de hacer algo aunque no sepas qué. Soleado y cómodo, ideal para salir sin drama. Campera liviana por si refresca al caer el sol.`;
  if (code===0) return `Despejado total en ${loc.name}, pero fresquito — no te dejés engañar por el sol. Día tranquilo para disfrutar si te abrigás bien. Una campera y listo.`;
  if ([61,63,65,80,81,82].includes(code)) return `Hoy llueve en ${loc.name}, así que el plan "quedarme en casa" ya tiene aval meteorológico oficial. Si tenés que salir sí o sí, paraguas de una y calzado que no se moje. El cielo claramente tiene otros planes para vos.`;
  if ([95,96,99].includes(code)) return `Tormenta en ${loc.name} — el cielo está con mal humor hoy. Quedáte bajo techo y aprovechá para hacer esas cosas que venís postergando. No es día de aventuras.`;
  return `El clima en ${loc.name} está un poco caprichoso hoy. Salí preparado para cualquier cosa y no te alejés sin mirar el cielo antes.`;
}

// ─── RECOMENDACIONES ──────────────────────────────────────────────────────────
function getRecs(c, d) {
  const it=[], t=c.temperature_2m, rain=d.precipitation_sum[0], w=c.wind_speed_10m, uv=d.uv_index_max[0], h=c.relative_humidity_2m;
  if(t<5){it.push('Abrigo pesado');it.push('Guantes y bufanda');}
  else if(t<10) it.push('Campera bien abrigada');
  else if(t<15) it.push('Campera o buzo');
  else if(t<20) it.push('Campera liviana');
  else if(t<26) it.push('Ropa de media estación');
  else it.push('Ropa fresca y liviana');
  if(rain>1) it.push('Paraguas o piloto');
  if(w>35) it.push('Cuidado con el viento');
  if(uv>=8) it.push('Protector solar obligatorio');
  else if(uv>=5) it.push('Protector solar');
  if(t>30) it.push('Mucha agua');
  if(h>80&&t>24) it.push('Ropa transpirable');
  return it.map(i=>`<span class="rp">${i}</span>`).join('');
}

// ─── BUSCADOR MEJORADO — múltiples fuentes ────────────────────────────────────
async function searchCities(q) {
  const results = [];
  const seen = new Set();

  // 1. Open-Meteo geocoding (principal)
  try {
    const r = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(q)}&count=8&language=es`);
    const d = await r.json();
    for (const c of (d.results||[])) {
      const key = `${c.latitude.toFixed(2)}_${c.longitude.toFixed(2)}`;
      if (!seen.has(key)) {
        seen.add(key);
        const admin = [c.admin1, c.admin2, c.admin3].filter(Boolean).join(', ');
        results.push({
          lat: c.latitude, lon: c.longitude,
          name: c.name,
          display: c.name + (admin ? ', ' + admin : ''),
          country: c.country || '',
          source: 'geo'
        });
      }
    }
  } catch {}

  // 2. Nominatim como fallback/complemento para lugares pequeños
  if (results.length < 3) {
    try {
      const r = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=5&accept-language=es&addressdetails=1`, {
        headers:{'User-Agent':'ClimaParaDummies/1.0'}
      });
      const d = await r.json();
      for (const c of d) {
        const key = `${parseFloat(c.lat).toFixed(2)}_${parseFloat(c.lon).toFixed(2)}`;
        if (!seen.has(key) && c.type !== 'administrative') {
          seen.add(key);
          const addr = c.address||{};
          const name = addr.city || addr.town || addr.village || addr.county || addr.state || c.display_name.split(',')[0];
          const country = addr.country || '';
          const region = [addr.state, addr.country].filter(Boolean).join(', ');
          results.push({
            lat: parseFloat(c.lat), lon: parseFloat(c.lon),
            name,
            display: name + (region ? ', ' + region : ''),
            country,
            source: 'nom'
          });
        }
      }
    } catch {}
  }

  return results;
}

        fetchWeather(lat, lon, city, country);
      } catch {
        fetchWeather(lat, lon, 'Mi ubicación', '');
      }
    }, () => {
      // Si falla la geo, carga Villa Mercedes por defecto
      fetchWeather(-33.6742, -65.4578, 'Villa Mercedes', 'Argentina');
    });
  } else {
    fetchWeather(-33.6742, -65.4578, 'Villa Mercedes', 'Argentina');
  }
});
</script>
